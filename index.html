<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cobrança Operacional</title>
    
    <!-- Tailwind CSS (Estilos) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel (Para o navegador entender o código React) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Import Map para resolver dependências de módulos ES (como react/jsx-runtime) -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0",
        "recharts": "https://esm.sh/recharts@2.10.3?bundle&deps=react@18.2.0,react-dom@18.2.0",
        "lodash/": "https://esm.sh/lodash@4.17.21/",
        "lodash": "https://esm.sh/lodash@4.17.21"
      }
    }
    </script>

    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #F8FAFC; margin: 0; padding: 0; }
        .animate-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Código da Aplicação -->
    <script type="text/babel" data-type="module">
        import React, { useState, useMemo, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
          LayoutDashboard, Link2, Building2, UploadCloud, Search, Bell, 
          CheckCircle2, AlertCircle, Filter, Menu, X, Zap, ArrowRight, 
          SearchCode, TableProperties, ArrowUpDown, Download, FileUp, 
          Loader2, ExternalLink, Clock, FileText, FileBadge2, FileImage, 
          Trash2, Eye, Camera, Send, Mail, UserCircle2, Pencil
        } from 'lucide-react';
        import { 
          BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip as RechartsTooltip, 
          ResponsiveContainer, PieChart, Pie, Cell 
        } from 'recharts';

        const cleanCnpj = (cnpj) => String(cnpj || '').replace(/\D/g, '');
        const formatCnpj = (cnpj) => cleanCnpj(cnpj).replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, "$1.$2.$3/$4-$5");
        const formatCurrency = (value) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value || 0);

        const parseDate = (dateStr) => {
          if (!dateStr) return new Date();
          if (dateStr.includes('T')) return new Date(dateStr);
          const parts = dateStr.split('/');
          if (parts.length === 3) return new Date(parts[2], parts[1] - 1, parts[0]);
          return new Date();
        };

        const calcularDiasAtraso = (dataStr) => {
          const dataEmissao = parseDate(dataStr);
          const hoje = new Date();
          const diffTime = hoje.getTime() - dataEmissao.getTime();
          return Math.max(0, Math.floor(diffTime / (1000 * 60 * 60 * 24)));
        };

        const mapNFs = (data) => data.map((item, index) => ({
          id: String(item['Chave de Acesso'] || item['Número'] || `nf-${index}`) + `_idx_${index}`,
          cnpj: String(item['CNPJ Emitente'] || ''),
          nome: String(item['Nome PJ Emitente'] || ''),
          data: String(item['Data Emissão'] || new Date().toLocaleDateString('pt-BR')),
          numero: String(item['Número'] || ''),
          valor: Number(item['Valor Total da Nota']) || 0,
          status: 'pendente'
        }));

        const mapPedidos = (data) => data.map((item, index) => ({
          id: String(item['Pedido'] || `ped-${index}`) + `_idx_${index}`,
          numeroPedido: String(item['Pedido'] || 'Sem Nº'),
          cnpj: String(item['Fornecedor Nº CNPJ'] || ''),
          fornecedor: String(item['Fornecedor Razão Social'] || ''),
          centroCusto: String(item['Centro de Custo de Alocação'] || 'Setor Não Identificado'),
          valor: Number(item['Valor Total do Item']) || 0,
          criador: String(item['Usuário de Criação'] || ''),
          descricao: String(item['Descrição do Item'] || 'Sem descrição detalhada'),
          quantidade: String(item['Quantidade do item'] || '1')
        }));

        function App() {
          const [activeTab, setActiveTab] = useState('setores');
          const [nfs, setNfs] = useState([]);
          const [pedidos, setPedidos] = useState([]);
          const [vinculos, setVinculos] = useState([]);
          const [isSidebarOpen, setIsSidebarOpen] = useState(true);
          
          const [filtroSetor, setFiltroSetor] = useState('Todos');
          const [emailsSetores, setEmailsSetores] = useState({});
          const [nfSelecionada, setNfSelecionada] = useState(null);
          const [anexosNf, setAnexosNf] = useState({});
          
          const [setoresManuais, setSetoresManuais] = useState({});
          const [isEditingNfInfo, setIsEditingNfInfo] = useState(false);
          const [editSetor, setEditSetor] = useState('');
          const [searchPedidoStr, setSearchPedidoStr] = useState('');

          const [dadosFiscais, setDadosFiscais] = useState({}); 
          const [modalFiscalOpen, setModalFiscalOpen] = useState(null);
          const [formFiscalNome, setFormFiscalNome] = useState('');
          const [formFiscalFile, setFormFiscalFile] = useState(null);

          const [loading, setLoading] = useState(true);
          const [error, setError] = useState(null);

          useEffect(() => {
            const fetchPlanilha = async () => {
              try {
                const urlAPI = 'https://script.google.com/macros/s/AKfycbzWeQGD7diqtSDSqfPyQ0tJbAJD7zVRWn4N81rMCQWQqghOc1iLDG8cdJYsfp5qmbie/exec';
                const response = await fetch(urlAPI);
                if (!response.ok) throw new Error("Erro na API.");
                const data = await response.json();
                
                if (data.nfs) setNfs(mapNFs(data.nfs));
                if (data.pedidos) setPedidos(mapPedidos(data.pedidos));
              } catch (err) {
                setError("Não foi possível conectar com a planilha.");
              } finally {
                setLoading(false);
              }
            };
            fetchPlanilha();
          }, []);

          const nfsMapeadas = useMemo(() => {
            return nfs.map(nf => {
              const vinculo = vinculos.find(v => v.nfId === nf.id);
              let pedidoRelacionado = null;
              
              if (vinculo) {
                pedidoRelacionado = pedidos.find(p => p.id === vinculo.pedidoId);
              } else {
                const possiveis = pedidos.filter(p => cleanCnpj(p.cnpj) === cleanCnpj(nf.cnpj));
                if (possiveis.length === 1) { 
                  pedidoRelacionado = possiveis[0]; 
                } else if (possiveis.length > 1) {
                  pedidoRelacionado = possiveis[0];
                }
              }
              
              let centroCusto = 'Setor Indefinido (Sem Pedido)';
              if (setoresManuais[nf.id]) {
                centroCusto = setoresManuais[nf.id];
              } else if (pedidoRelacionado) {
                centroCusto = pedidoRelacionado.centroCusto;
              }
              
              return {
                ...nf,
                pedido: pedidoRelacionado,
                centroCusto,
                diasAtraso: calcularDiasAtraso(nf.data)
              };
            });
          }, [nfs, pedidos, vinculos, setoresManuais]);

          const setores = useMemo(() => {
            return Array.from(new Set(nfsMapeadas.map(n => n.centroCusto))).sort();
          }, [nfsMapeadas]);

          const setoresDisponiveis = useMemo(() => {
            return Array.from(new Set(pedidos.map(p => p.centroCusto))).filter(Boolean).sort();
          }, [pedidos]);

          const handleAbrirDetalhes = (nf) => {
            setNfSelecionada(nf);
            setIsEditingNfInfo(false);
            setEditSetor(setoresManuais[nf.id] || '');
            setSearchPedidoStr('');
          };

          const kpis = useMemo(() => {
            const notasParaConciliar = nfsMapeadas.filter(n => !n.pedido).length;
            const pendentesFiscal = nfsMapeadas.filter(n => n.pedido && !dadosFiscais[n.id]);
            const concluidas = nfsMapeadas.filter(n => dadosFiscais[n.id]);
            
            return {
              notasParaConciliar,
              pendentesFiscal: pendentesFiscal.length,
              valorPendenteFiscal: pendentesFiscal.reduce((acc, curr) => acc + curr.valor, 0),
              totalConcluidas: concluidas.length,
              valorConcluido: concluidas.reduce((acc, curr) => acc + curr.valor, 0),
              progresso: nfsMapeadas.length > 0 ? Math.round((concluidas.length / nfsMapeadas.length) * 100) : 0
            };
          }, [nfsMapeadas, dadosFiscais]);

          const topSetoresPendentes = useMemo(() => {
            const agrupamento = {};
            nfsMapeadas.forEach(nf => {
              if (!dadosFiscais[nf.id]) {
                const setor = nf.centroCusto;
                if (!agrupamento[setor]) agrupamento[setor] = { qtde: 0, valor: 0 };
                agrupamento[setor].qtde += 1;
                agrupamento[setor].valor += nf.valor;
              }
            });
            return Object.entries(agrupamento)
              .map(([nome, dados]) => ({ nome: nome.split(' - ')[1] || nome, ...dados }))
              .sort((a, b) => b.valor - a.valor)
              .slice(0, 4);
          }, [nfsMapeadas, dadosFiscais]);

          const handleVincularManual = (nfId, pedidoId) => {
            setVinculos([...vinculos, { nfId, pedidoId, data: new Date().toISOString() }]);
          };

          const handleDesvincular = (nfId) => {
            setVinculos(vinculos.filter(v => v.nfId !== nfId));
          };

          const handleUploadPDFNota = (nfId, e) => {
            const file = e.target.files[0];
            if (file) {
              setAnexosNf(prev => ({
                ...prev,
                [nfId]: { name: file.name, size: `${(file.size/1024/1024).toFixed(2)} MB`, type: file.type, url: URL.createObjectURL(file) }
              }));
            }
          };

          const handleSalvarFiscal = () => {
            if (!formFiscalNome || !formFiscalFile) return;
            setDadosFiscais(prev => ({
              ...prev,
              [modalFiscalOpen]: {
                nome: formFiscalNome,
                fileName: formFiscalFile.name,
                fileUrl: URL.createObjectURL(formFiscalFile),
                data: new Date().toLocaleDateString('pt-BR')
              }
            }));
            setModalFiscalOpen(null);
          };

          const renderModalLancarFiscal = () => {
            if (!modalFiscalOpen) return null;
            return (
              <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[200] flex items-center justify-center p-4">
                <div className="bg-white rounded-3xl w-full max-w-md shadow-2xl overflow-hidden flex flex-col">
                  <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-indigo-600">
                    <h2 className="text-xl font-bold text-white flex items-center gap-2">
                      <CheckCircle2 size={24} /> Lançar para o Fiscal
                    </h2>
                    <button onClick={() => setModalFiscalOpen(null)} className="p-1.5 text-indigo-200 hover:text-white rounded-xl transition-colors">
                      <X size={20} />
                    </button>
                  </div>
                  <div className="p-6 space-y-5 bg-slate-50/50">
                    <div className="bg-amber-50 border border-amber-100 p-3 rounded-xl mb-2">
                      <p className="text-xs font-bold text-amber-800">Obrigatório: Identifique-se e anexe o print do E-mail enviado.</p>
                    </div>
                    <div>
                      <label className="block text-sm font-bold text-slate-700 mb-1.5">Sua Assinatura / Nome</label>
                      <div className="relative">
                        <UserCircle2 className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                        <input 
                          type="text" 
                          placeholder="Ex: João Silva" 
                          value={formFiscalNome}
                          onChange={(e) => setFormFiscalNome(e.target.value)}
                          className="w-full pl-10 pr-4 py-2.5 bg-white border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none"
                        />
                      </div>
                    </div>
                    <div>
                      <label className="block text-sm font-bold text-slate-700 mb-1.5">Print do E-mail</label>
                      <div className="border-2 border-dashed border-slate-300 rounded-xl p-4 bg-white hover:bg-indigo-50 hover:border-indigo-300 transition-colors cursor-pointer text-center relative">
                        <input 
                          type="file" 
                          className="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                          accept="image/*,.pdf"
                          onChange={(e) => setFormFiscalFile(e.target.files[0])}
                        />
                        <Camera size={24} className={`mx-auto mb-2 ${formFiscalFile ? 'text-indigo-600' : 'text-slate-400'}`} />
                        {formFiscalFile ? (
                          <p className="text-sm font-bold text-indigo-600 truncate px-2">{formFiscalFile.name}</p>
                        ) : (
                          <>
                            <p className="text-sm font-bold text-slate-600">Clique para anexar o Print</p>
                            <p className="text-xs text-slate-400 mt-1">Obrigatório Imagens ou PDF</p>
                          </>
                        )}
                      </div>
                    </div>
                  </div>
                  <div className="p-5 border-t border-slate-100 bg-white flex justify-end gap-3">
                    <button onClick={() => setModalFiscalOpen(null)} className="px-5 py-2.5 text-sm font-bold text-slate-500 hover:bg-slate-100 rounded-xl transition-colors">Cancelar</button>
                    <button 
                      onClick={handleSalvarFiscal}
                      disabled={!formFiscalNome || !formFiscalFile}
                      className="px-5 py-2.5 bg-indigo-600 text-white text-sm font-bold rounded-xl hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors shadow-sm flex items-center gap-2"
                    >
                      Confirmar Envio <Send size={16} />
                    </button>
                  </div>
                </div>
              </div>
            );
          };

          const renderModalDetalhesNF = () => {
            if (!nfSelecionada) return null;
            const anexoPDF = anexosNf[nfSelecionada.id];
            const isVinculado = vinculos.some(v => v.nfId === nfSelecionada.id);
            const pedContext = nfSelecionada.pedido;
            const sugestoesExtras = pedidos.filter(p => cleanCnpj(p.cnpj) === cleanCnpj(nfSelecionada.cnpj));

            return (
              <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                <div className="bg-white rounded-3xl w-full max-w-4xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
                  
                  <div className="p-6 border-b border-slate-100 flex justify-between items-start bg-slate-50">
                    <div>
                      <div className="flex items-center gap-3 mb-2">
                        <span className="text-xs font-black px-3 py-1 bg-indigo-100 text-indigo-700 rounded-lg uppercase tracking-wider">Nota Fiscal Nº {nfSelecionada.numero}</span>
                        <span className={`text-[10px] font-black px-2 py-1 rounded-lg uppercase tracking-wider flex items-center gap-1 ${nfSelecionada.diasAtraso > 15 ? 'bg-rose-100 text-rose-700' : 'bg-amber-100 text-amber-700'}`}>
                          <Clock size={12}/> Aguardando há {nfSelecionada.diasAtraso} dias
                        </span>
                      </div>
                      <h2 className="text-2xl font-bold text-slate-800">{nfSelecionada.nome}</h2>
                      <p className="text-sm text-slate-500 font-mono mt-1">CNPJ: {formatCnpj(nfSelecionada.cnpj)}</p>
                    </div>
                    <button onClick={() => setNfSelecionada(null)} className="p-2 bg-white border border-slate-200 rounded-xl text-slate-400 hover:text-slate-700 hover:bg-slate-100 transition-colors">
                      <X size={20} />
                    </button>
                  </div>

                  <div className="p-6 overflow-y-auto flex-1 space-y-8 bg-white">
                    <div>
                      <div className="flex justify-between items-center mb-4">
                        <h3 className="text-sm font-bold text-slate-800 flex items-center gap-2 uppercase tracking-wider">
                          <Building2 size={16} className="text-indigo-500" /> Referência no Sistema (Pedido / Setor)
                        </h3>
                        <button
                          onClick={() => setIsEditingNfInfo(!isEditingNfInfo)}
                          className="flex items-center gap-1.5 px-3 py-1.5 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 rounded-lg text-xs font-bold transition-colors shadow-sm"
                        >
                          <Pencil size={12} /> {isEditingNfInfo ? 'Cancelar Edição' : 'Editar Vínculo/Setor'}
                        </button>
                      </div>

                      {isEditingNfInfo ? (
                        <div className="bg-white border-2 border-indigo-100 rounded-2xl p-5 shadow-sm space-y-5">
                          <div>
                            <label className="text-xs font-bold text-slate-500 uppercase">1. Forçar Setor Manualmente</label>
                            <div className="flex flex-col md:flex-row gap-2 mt-1.5">
                              <select value={editSetor} onChange={e => setEditSetor(e.target.value)} className="flex-1 p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-indigo-500 font-medium text-slate-700">
                                  <option value="">-- Herdar Setor do Pedido Original --</option>
                                  {setoresDisponiveis.map((s, idx) => <option key={`opt-${idx}`} value={s}>{s}</option>)}
                              </select>
                              <button
                                  onClick={() => {
                                      setSetoresManuais(prev => { const next = { ...prev }; if (editSetor) next[nfSelecionada.id] = editSetor; else delete next[nfSelecionada.id]; return next; });
                                      setIsEditingNfInfo(false);
                                  }}
                                  className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2.5 rounded-xl text-xs font-bold transition-colors shadow-sm"
                              >Gravar Setor</button>
                            </div>
                          </div>

                          <div className="pt-5 border-t border-slate-100">
                            <label className="text-xs font-bold text-slate-500 uppercase">2. Buscar e Vincular Pedido</label>
                            <div className="relative mt-1.5">
                                <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={16}/>
                                <input type="text" placeholder="Digite o Nº do Pedido..." value={searchPedidoStr} onChange={e => setSearchPedidoStr(e.target.value)} className="w-full pl-10 p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-indigo-500 font-medium"/>
                            </div>
                            {searchPedidoStr.length > 1 && (
                                <div className="mt-3 max-h-48 overflow-y-auto border border-slate-200 rounded-xl bg-white shadow-sm divide-y divide-slate-50">
                                    {pedidos.filter(p => p.numeroPedido.includes(searchPedidoStr) || p.fornecedor.toLowerCase().includes(searchPedidoStr.toLowerCase())).map((p, idx) => (
                                        <div key={`src-ped-${p.id}-${idx}`} className="flex justify-between items-center p-3 hover:bg-indigo-50/50 transition-colors">
                                            <div>
                                                <p className="text-xs font-bold text-slate-800">Ped. {p.numeroPedido}</p>
                                                <p className="text-[10px] text-slate-500 truncate w-48">{p.fornecedor}</p>
                                            </div>
                                            <button onClick={() => { handleVincularManual(nfSelecionada.id, p.id); setIsEditingNfInfo(false); }} className="bg-emerald-500 hover:bg-emerald-600 text-white text-[10px] font-bold px-3 py-1.5 rounded-lg flex items-center gap-1 transition-colors"><Link2 size={12}/> Vincular</button>
                                        </div>
                                    ))}
                                </div>
                            )}
                          </div>
                        </div>
                      ) : pedContext ? (
                        <div className="bg-slate-50 border border-slate-200 rounded-2xl p-5 shadow-sm grid grid-cols-1 md:grid-cols-4 gap-6 relative overflow-hidden">
                          <div className="absolute top-0 left-0 w-1.5 h-full bg-indigo-500"></div>
                          <div className="md:col-span-2">
                            <p className="text-xs font-bold text-slate-400 uppercase mb-1.5 flex items-center gap-1.5">Descrição do Item</p>
                            <p className="text-sm font-bold text-slate-800 leading-relaxed">{pedContext.descricao}</p>
                            <div className="flex items-center gap-2 mt-2">
                              <span className="text-[10px] bg-white border border-slate-200 px-2 py-1 rounded font-bold text-slate-600">Pedido Nº {pedContext.numeroPedido}</span>
                              <span className="text-[10px] bg-indigo-50 text-indigo-700 px-2 py-1 rounded font-bold">{pedContext.centroCusto}</span>
                            </div>
                          </div>
                          <div>
                            <p className="text-xs font-bold text-slate-400 uppercase mb-1.5 flex items-center gap-1.5">Quantidade</p>
                            <p className="text-sm font-bold text-slate-800">{pedContext.quantidade} unidades</p>
                          </div>
                          <div className="text-right">
                            <p className="text-xs font-bold text-slate-400 uppercase mb-1.5 flex items-center gap-1.5 justify-end">Valor Autorizado</p>
                            <p className="text-lg font-black text-emerald-600">{formatCurrency(pedContext.valor)}</p>
                          </div>
                        </div>
                      ) : (
                        <div className="bg-amber-50 border border-amber-200 rounded-2xl p-5">
                          <p className="text-sm font-bold text-amber-800 flex items-center gap-2"><AlertCircle size={16}/> Sem pedido de origem automático.</p>
                          {setoresManuais[nfSelecionada.id] ? (
                             <div className="mt-3 text-xs text-indigo-700 bg-indigo-100/60 p-3 rounded-xl font-bold flex items-center gap-2"><CheckCircle2 size={16} className="text-indigo-500" />Encaminhada manualmente para: {setoresManuais[nfSelecionada.id]}</div>
                          ) : (
                             <p className="text-xs mt-2 text-amber-700 font-medium">Use o botão <span className="font-bold">Editar Lápis</span> no topo.</p>
                          )}
                        </div>
                      )}
                    </div>

                    <div>
                      <h3 className="text-sm font-bold text-slate-800 flex items-center gap-2 mb-4 uppercase tracking-wider"><FileText size={16} className="text-indigo-500" /> Cópia da Nota Fiscal</h3>
                      {anexoPDF ? (
                        <div className="border border-slate-200 rounded-2xl p-5 bg-white shadow-sm flex items-center justify-between group hover:border-indigo-300 transition-all relative overflow-hidden">
                          <div className="absolute top-0 left-0 w-1.5 h-full bg-emerald-500"></div>
                          <div className="flex items-center gap-5 pl-2">
                            <div className="w-16 h-16 rounded-2xl flex items-center justify-center shrink-0 border border-slate-100 bg-slate-50 text-emerald-500 shadow-sm">
                              {anexoPDF.type.includes('image') ? <FileImage size={28} /> : <FileBadge2 size={28} />}
                            </div>
                            <div>
                              <p className="font-bold text-slate-800 text-base truncate max-w-sm">{anexoPDF.name}</p>
                              <span className="text-[10px] font-black text-slate-400 bg-slate-100 px-2 py-0.5 rounded uppercase">{anexoPDF.size}</span>
                            </div>
                          </div>
                          <div className="flex items-center gap-3">
                            <a href={anexoPDF.url} target="_blank" className="flex items-center justify-center w-10 h-10 bg-indigo-50 text-indigo-600 rounded-xl"><Eye size={18} /></a>
                            <button onClick={() => setAnexosNf(prev => {const n = {...prev}; delete n[nfSelecionada.id]; return n;})} className="flex items-center justify-center w-10 h-10 bg-rose-50 text-rose-500 rounded-xl"><Trash2 size={18} /></button>
                          </div>
                        </div>
                      ) : (
                        <div className="border-2 border-dashed border-slate-200 rounded-2xl p-6 bg-slate-50/50 flex flex-col items-center justify-center text-center">
                          <input type="file" id={`modal-file-nf-${nfSelecionada.id}`} className="hidden" accept="image/*,.pdf" onChange={(e) => handleUploadPDFNota(nfSelecionada.id, e)} />
                          <label htmlFor={`modal-file-nf-${nfSelecionada.id}`} className="flex items-center justify-center gap-2 px-6 py-2.5 bg-white border border-slate-200 rounded-xl text-sm font-bold text-slate-700 cursor-pointer shadow-sm"><UploadCloud size={16} /> Anexar Ficheiro</label>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              </div>
            );
          };

          const renderSetores = () => (
            <div className="space-y-8 max-w-7xl mx-auto">
              <div className="flex flex-col md:flex-row justify-between items-start md:items-end gap-6 mb-4">
                <div>
                  <h2 className="text-3xl font-bold text-slate-800 tracking-tight">Análise & Cobrança Setorial</h2>
                  <p className="text-slate-500 mt-1 text-sm">Controle as faturas que chegaram, identifique o pedido origem e cobre o Lançamento Fiscal dos responsáveis.</p>
                </div>
                <div className="flex items-center gap-3 bg-white p-1.5 rounded-2xl shadow-sm border border-slate-200">
                  <div className="pl-3 text-slate-400"><Filter size={18} /></div>
                  <select value={filtroSetor} onChange={(e) => setFiltroSetor(e.target.value)} className="bg-transparent border-none rounded-xl pr-8 py-2 text-slate-700 font-bold text-sm focus:outline-none focus:ring-0 cursor-pointer">
                    <option value="Todos">Todos os Centros de Custo</option>
                    {setores.map((s, idx) => <option key={`filtro-${idx}`} value={s}>{s}</option>)}
                  </select>
                </div>
              </div>

              <div className="space-y-10">
                {setores.filter(s => filtroSetor === 'Todos' || s === filtroSetor).map((setor, idx) => {
                  const nfsDoSetor = nfsMapeadas.filter(n => n.centroCusto === setor);
                  const nfsAtrasadas = nfsDoSetor.filter(nf => !dadosFiscais[nf.id]);
                  const progressoSetor = nfsDoSetor.length > 0 ? Math.round(((nfsDoSetor.length - nfsAtrasadas.length) / nfsDoSetor.length) * 100) : 0;
                  const emailSetor = emailsSetores[setor] || "";
                  
                  let mailtoLink = '#';
                  if (emailSetor && nfsAtrasadas.length > 0) {
                    const listaPendentes = nfsAtrasadas.slice(0, 15).map(nf => `-> NF: ${nf.numero} - ${formatCurrency(nf.valor)}`).join('\n');
                    const body = `Olá,\n\nTemos notas aguardando lançamento fiscal:\n\n${listaPendentes}\n\nFavor realizar o lançamento.`;
                    mailtoLink = `mailto:${emailSetor}?subject=Lançamento Fiscal Pendente&body=${encodeURIComponent(body)}`;
                  }

                  return (
                    <div key={`setor-card-${idx}`} className="bg-slate-100/50 rounded-3xl p-6 md:p-8 border border-slate-200/60 shadow-sm relative">
                      <div className="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-8 gap-5">
                        <div className="flex-1 w-full">
                          <h3 className="font-black text-slate-800 text-2xl lg:text-3xl tracking-tight">{setor}</h3>
                          <div className="flex items-center gap-3 mt-4 w-full max-w-md">
                            <div className="w-full bg-slate-200/80 rounded-full h-2 overflow-hidden shadow-inner">
                              <div className={`h-2 rounded-full transition-all duration-1000 ${progressoSetor === 100 ? 'bg-emerald-500' : 'bg-indigo-500'}`} style={{ width: `${progressoSetor}%` }}></div>
                            </div>
                            <span className="text-xs font-black text-slate-500 w-12">{progressoSetor}% Ok</span>
                          </div>
                        </div>
                        
                        <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-3 w-full lg:w-auto bg-white p-2 rounded-2xl shadow-sm border border-slate-200">
                          <div className="relative group flex-1 sm:w-72">
                            <Mail className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-indigo-500 transition-colors" size={16} />
                            <input type="email" placeholder="E-mail do responsável..." value={emailsSetores[setor] || ''} onChange={(e) => setEmailsSetores(prev => ({ ...prev, [setor]: e.target.value }))} className="w-full pl-9 pr-4 py-3 bg-slate-50/50 border-none rounded-xl text-sm font-medium focus:outline-none"/>
                          </div>
                          <a href={mailtoLink} onClick={(e) => { if(!emailSetor || nfsAtrasadas.length === 0) e.preventDefault(); }} className={`flex justify-center items-center gap-2 px-6 py-3 rounded-xl text-sm font-bold transition-all shadow-sm shrink-0 ${emailSetor && nfsAtrasadas.length > 0 ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-400 cursor-not-allowed'}`}><Send size={16} /> Cobrar Setor</a>
                        </div>
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                        {nfsDoSetor.map((nf, nIdx) => {
                          const statusFiscal = dadosFiscais[nf.id];
                          return (
                            <div key={`nf-card-${nf.id}-${nIdx}`} className={`bg-white rounded-2xl border transition-all duration-300 flex flex-col justify-between overflow-hidden shadow-sm hover:shadow-md ${statusFiscal ? 'border-emerald-200' : 'border-slate-200'}`}>
                              <div onClick={() => handleAbrirDetalhes(nf)} className="p-5 cursor-pointer hover:bg-slate-50/50 transition-colors">
                                <div className="flex justify-between items-start mb-3">
                                  <div className="min-w-0 pr-3">
                                    <p className="text-xs font-black text-slate-800 uppercase tracking-wider">NF {nf.numero}</p>
                                    <p className="text-[11px] font-bold text-slate-500 truncate mt-0.5">{nf.nome}</p>
                                  </div>
                                  <div className="flex flex-col items-end shrink-0 gap-1.5">
                                    <span className="text-base font-black text-slate-900 tracking-tight">{formatCurrency(nf.valor)}</span>
                                    {!statusFiscal && <span className="text-[9px] font-black px-2 py-1 rounded-md bg-amber-100 text-amber-700 uppercase tracking-wider flex items-center gap-1"><Clock size={10} strokeWidth={3}/> {nf.diasAtraso} dias</span>}
                                  </div>
                                </div>
                                <div className="mt-4 bg-slate-50 rounded-xl p-3 border border-slate-100">
                                  {nf.pedido ? (
                                    <><span className="text-[9px] font-black text-indigo-500 uppercase tracking-wider block mb-1">Ref: Ped. {nf.pedido.numeroPedido}</span><p className="text-[11px] text-slate-600 line-clamp-2">{nf.pedido.descricao}</p></>
                                  ) : (<p className="text-[11px] text-amber-600 font-bold italic py-2 text-center">Fatura sem pedido vinculado.</p>)}
                                </div>
                              </div>
                              <div className="px-5 py-4 bg-slate-50/80 border-t border-slate-100 flex items-center justify-between">
                                {statusFiscal ? (
                                  <div className="flex items-center justify-between w-full">
                                    <div><p className="text-[10px] font-black text-emerald-600 uppercase flex items-center gap-1"><CheckCircle2 size={14}/> Lançado</p></div>
                                    <a href={statusFiscal.fileUrl} target="_blank" className="flex items-center gap-1.5 px-3 py-2 bg-white border border-slate-200 text-slate-600 rounded-lg text-[10px] font-bold shadow-sm"><Eye size={14}/> Ver Print</a>
                                  </div>
                                ) : (
                                  <button onClick={(e) => { e.stopPropagation(); setModalFiscalOpen(nf.id); }} className="w-full flex items-center justify-center gap-2 px-4 py-2.5 bg-white border border-slate-200 rounded-xl text-xs font-bold text-slate-600 hover:text-indigo-700 transition-all">Registrar Lançamento <ArrowRight size={14}/></button>
                                )}
                              </div>
                            </div>
                          )
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );

          const renderDashboard = () => (
            <div className="space-y-8 max-w-7xl mx-auto">
              <div>
                <h2 className="text-3xl font-bold text-slate-800 tracking-tight">Painel Executivo</h2>
                <p className="text-slate-500 mt-1">Acompanhamento financeiro e gargalos setoriais.</p>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <div className="bg-white rounded-3xl p-6 border border-slate-100 shadow-sm relative overflow-hidden group">
                  <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 relative z-10">Aguardando Conciliação</p>
                  <h3 className="text-4xl font-black text-slate-800 relative z-10">{kpis.notasParaConciliar}</h3>
                </div>
                <div className="bg-white rounded-3xl p-6 border border-slate-100 shadow-sm relative overflow-hidden group">
                  <p className="text-xs font-bold text-rose-400 uppercase tracking-wider mb-2 relative z-10">Pendentes de Fiscal</p>
                  <h3 className="text-4xl font-black text-rose-600 relative z-10">{kpis.pendentesFiscal}</h3>
                </div>
                <div className="bg-indigo-600 rounded-3xl p-6 shadow-xl shadow-indigo-600/20 text-white relative overflow-hidden lg:col-span-2 flex flex-col justify-between">
                  <div>
                    <p className="text-xs font-bold text-indigo-200 uppercase tracking-wider mb-1">Índice Global de Conciliação</p>
                    <div className="flex items-baseline space-x-2"><h3 className="text-6xl font-black text-white tracking-tighter">{kpis.progresso}%</h3></div>
                  </div>
                </div>
              </div>
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div className="lg:col-span-2 bg-white rounded-3xl border border-slate-100 p-6 shadow-sm">
                  <h3 className="text-sm font-bold text-slate-800 uppercase tracking-wider mb-6 flex items-center gap-2"><Building2 size={16} className="text-indigo-500"/> Faturas Atrasadas por Setor</h3>
                  <div className="h-72 w-full">
                    <ResponsiveContainer width="100%" height="100%">
                      <BarChart data={topSetoresPendentes} margin={{ top: 10, right: 10, left: 0, bottom: 20 }}>
                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                        <XAxis dataKey="nome" axisLine={false} tickLine={false} tick={{ fontSize: 11, fill: '#64748b', fontWeight: 'bold' }} dy={10} />
                        <YAxis axisLine={false} tickLine={false} tick={{ fontSize: 11, fill: '#64748b' }} tickFormatter={(val) => `R$ ${val/1000}k`} />
                        <RechartsTooltip cursor={{fill: '#f8fafc'}} formatter={(value) => formatCurrency(value)} />
                        <Bar dataKey="valor" fill="#4f46e5" radius={[8, 8, 0, 0]} barSize={45}>
                          {topSetoresPendentes.map((entry, index) => <Cell key={`cell-bar-${index}`} fill={index === 0 ? '#f43f5e' : '#818cf8'} />)}
                        </Bar>
                      </BarChart>
                    </ResponsiveContainer>
                  </div>
                </div>
              </div>
            </div>
          );

          if (loading) {
            return (
              <div className="min-h-screen bg-[#F8FAFC] flex flex-col items-center justify-center font-sans">
                <Loader2 size={56} className="text-indigo-600 animate-spin mb-6" />
                <h2 className="text-2xl font-bold text-slate-800">Conectando à sua Planilha...</h2>
              </div>
            );
          }

          if (error) {
            return (
              <div className="min-h-screen bg-[#F8FAFC] flex flex-col items-center justify-center font-sans">
                <div className="p-5 bg-rose-50 text-rose-600 rounded-full mb-6"><AlertCircle size={56} /></div>
                <h2 className="text-2xl font-bold text-slate-800">Erro de Sincronização</h2>
                <p className="text-slate-500 mt-3 max-w-md text-center">{error}</p>
                <button onClick={() => window.location.reload()} className="mt-8 px-8 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold shadow-sm">Tentar Novamente</button>
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-[#F8FAFC] flex overflow-hidden font-sans text-slate-900">
              {renderModalDetalhesNF()}
              {renderModalLancarFiscal()}
              
              <aside className={`fixed lg:static inset-y-0 left-0 z-50 w-72 bg-white border-r border-slate-200 flex flex-col transition-transform duration-300 ease-in-out shadow-sm ${!isSidebarOpen ? '-translate-x-full lg:translate-x-0 lg:w-20' : 'translate-x-0'}`}>
                <div className="h-24 flex items-center justify-between px-6 border-b border-slate-100 bg-white shrink-0">
                  {isSidebarOpen ? <h2 className="font-bold text-xl text-indigo-700">Painel Financeiro</h2> : <h2 className="font-bold text-xl text-indigo-700 mx-auto">P</h2>}
                  <button className="lg:hidden p-2 text-slate-400" onClick={() => setIsSidebarOpen(false)}><X size={20} /></button>
                </div>
                <nav className="flex-1 overflow-y-auto py-6 px-4 space-y-2">
                  <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center space-x-3 px-4 py-3.5 rounded-2xl text-sm font-semibold ${activeTab === 'dashboard' ? 'bg-indigo-50 text-indigo-700' : 'text-slate-500'}`}><LayoutDashboard size={20} />{isSidebarOpen && <span>Dashboard Executivo</span>}</button>
                  <button onClick={() => setActiveTab('setores')} className={`w-full flex items-center space-x-3 px-4 py-3.5 rounded-2xl text-sm font-semibold ${activeTab === 'setores' ? 'bg-indigo-50 text-indigo-700' : 'text-slate-500'}`}><Building2 size={20} />{isSidebarOpen && <span>Ação & Cobrança</span>}</button>
                  {isSidebarOpen && (
                    <div className="mt-8 pt-6 border-t border-slate-100">
                      <a href="https://docs.google.com/spreadsheets/d/1mWmng3rSj5l1DhYp5CSuj9sIh0aemrEJ5ZPzTTgYc1I/" target="_blank" className="w-full flex items-center space-x-3 px-4 py-3.5 rounded-2xl text-sm font-semibold bg-emerald-50 text-emerald-700"><TableProperties size={20} /><span>Planilha Alimentadora</span></a>
                    </div>
                  )}
                </nav>
              </aside>

              <main className="flex-1 flex flex-col h-screen overflow-hidden relative">
                <header className="h-20 bg-white/80 border-b border-slate-200/60 flex items-center justify-between px-8 shrink-0 z-10">
                  <div className="flex items-center gap-4">
                    <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="text-slate-400"><Menu size={22} /></button>
                    <h1 className="text-xl font-bold text-slate-800">{activeTab === 'dashboard' ? 'Painel Analítico' : 'Cobrança Operacional'}</h1>
                  </div>
                </header>
                <div className="flex-1 overflow-y-auto p-6 md:p-8">
                  <div className="h-full">
                    {activeTab === 'dashboard' && renderDashboard()}
                    {activeTab === 'setores' && renderSetores()}
                  </div>
                </div>
              </main>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
