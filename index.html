<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cobrança Operacional PRO</title>
    
    <!-- Fonte Inter do Google Fonts para um visual Premium SaaS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out forwards',
                        'slide-up': 'slideUp 0.4s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
                    }
                }
            }
        }
    </script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Import Map -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0",
        "recharts": "https://esm.sh/recharts@2.10.3?bundle&deps=react@18.2.0,react-dom@18.2.0",
        "lodash": "https://esm.sh/lodash@4.17.21"
      }
    }
    </script>

    <style>
        body { 
            background-color: #F8FAFC; 
            margin: 0; 
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        /* Custom Scrollbar for a cleaner look */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useMemo, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
          LayoutDashboard, Link2, Building2, UploadCloud, Search, 
          CheckCircle2, AlertCircle, Filter, Menu, X, ArrowRight, 
          TableProperties, Clock, FileText, FileBadge2, FileImage, 
          Trash2, Eye, Camera, Send, Mail, UserCircle2, Pencil,
          TrendingUp, AlertTriangle, FileCheck2, ChevronRight, Wand2
        } from 'lucide-react';
        import { 
          BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip as RechartsTooltip, 
          ResponsiveContainer, Cell 
        } from 'recharts';

        // --- Helpers ---
        const cleanCnpj = (cnpj) => String(cnpj || '').replace(/\D/g, '');
        const formatCnpj = (cnpj) => cleanCnpj(cnpj).replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, "$1.$2.$3/$4-$5");
        const formatCurrency = (value) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value || 0);

        const formatChave = (chave) => {
          const c = String(chave || '').replace(/\D/g, '');
          if (c.length !== 44) return chave; 
          return c.replace(/(\d{4})(?=\d)/g, '$1 ').trim();
        };

        const parseDate = (dateStr) => {
          if (!dateStr) return new Date();
          if (dateStr.includes('T')) return new Date(dateStr);
          const parts = dateStr.split('/');
          if (parts.length === 3) return new Date(parts[2], parts[1] - 1, parts[0]);
          return new Date();
        };

        const calcularDiasAtraso = (dataStr) => {
          const dataEmissao = parseDate(dataStr);
          const diffTime = new Date().getTime() - dataEmissao.getTime();
          return Math.max(0, Math.floor(diffTime / (1000 * 60 * 60 * 24)));
        };

        // --- Mapeamentos ---
        const mapNFs = (data) => data.map((item, index) => ({
          id: String(item['Chave de Acesso'] || item['Número'] || `nf-${index}`) + `_idx_${index}`,
          chaveAcesso: String(item['Chave de Acesso'] || ''),
          descricaoMaterial: String(item['Descrição'] || item['Descrição do Item'] || item['Descrição do Material'] || item['Material'] || item['Produto/Serviço'] || ''),
          cnpj: String(item['CNPJ Emitente'] || ''),
          nome: String(item['Nome PJ Emitente'] || 'Fornecedor Não Identificado'),
          data: String(item['Data Emissão'] || new Date().toLocaleDateString('pt-BR')),
          numero: String(item['Número'] || 'S/N'),
          valor: Number(item['Valor Total da Nota']) || 0,
          status: 'pendente'
        }));

        const mapPedidos = (data) => data.map((item, index) => ({
          id: String(item['Pedido'] || `ped-${index}`) + `_idx_${index}`,
          numeroPedido: String(item['Pedido'] || 'Sem Nº'),
          cnpj: String(item['Fornecedor Nº CNPJ'] || ''),
          fornecedor: String(item['Fornecedor Razão Social'] || ''),
          centroCusto: String(item['Centro de Custo de Alocação'] || 'Setor Não Identificado'),
          valor: Number(item['Valor Total do Item']) || 0,
          criador: String(item['Usuário de Criação'] || ''),
          descricao: String(item['Descrição do Item'] || 'Sem descrição detalhada'),
          quantidade: String(item['Quantidade do item'] || '1')
        }));

        // --- Componente Principal ---
        function App() {
          const [activeTab, setActiveTab] = useState('dashboard');
          const [nfs, setNfs] = useState([]);
          const [pedidos, setPedidos] = useState([]);
          const [vinculos, setVinculos] = useState([]);
          const [isSidebarOpen, setIsSidebarOpen] = useState(true);
          
          const [filtroSetor, setFiltroSetor] = useState('Todos');
          const [emailsSetores, setEmailsSetores] = useState({});
          const [nfSelecionada, setNfSelecionada] = useState(null);
          const [anexosNf, setAnexosNf] = useState({});
          
          const [setoresManuais, setSetoresManuais] = useState({});
          const [isEditingNfInfo, setIsEditingNfInfo] = useState(false);
          const [editSetor, setEditSetor] = useState('');
          const [searchPedidoStr, setSearchPedidoStr] = useState('');

          const [dadosFiscais, setDadosFiscais] = useState({}); 
          const [modalFiscalOpen, setModalFiscalOpen] = useState(null);
          const [formFiscalNome, setFormFiscalNome] = useState('');
          const [formFiscalObs, setFormFiscalObs] = useState('');
          const [formFiscalFile, setFormFiscalFile] = useState(null);

          const [loading, setLoading] = useState(true);
          const [error, setError] = useState(null);

          useEffect(() => {
            const fetchPlanilha = async () => {
              try {
                // Endpoint realutivo de demonstração (substitua pela sua URL se necessário)
                const urlAPI = 'https://script.google.com/macros/s/AKfycbzWeQGD7diqtSDSqfPyQ0tJbAJD7zVRWn4N81rMCQWQqghOc1iLDG8cdJYsfp5qmbie/exec';
                const response = await fetch(urlAPI);
                if (!response.ok) throw new Error("Erro na comunicação com o servidor.");
                const data = await response.json();
                
                if (data.nfs) setNfs(mapNFs(data.nfs));
                if (data.pedidos) setPedidos(mapPedidos(data.pedidos));
              } catch (err) {
                console.error(err);
                setError("Não foi possível conectar com a base de dados. Verifique a planilha origem.");
              } finally {
                setLoading(false);
              }
            };
            fetchPlanilha();
          }, []);

          // --- Lógica Derivada (Memoized) ---
          const nfsMapeadas = useMemo(() => {
            return nfs.map(nf => {
              const vinculo = vinculos.find(v => v.nfId === nf.id);
              let pedidoRelacionado = null;
              
              if (vinculo) {
                pedidoRelacionado = pedidos.find(p => p.id === vinculo.pedidoId);
              } else {
                const possiveis = pedidos.filter(p => cleanCnpj(p.cnpj) === cleanCnpj(nf.cnpj));
                if (possiveis.length > 0) pedidoRelacionado = possiveis[0]; 
              }
              
              let centroCusto = 'Setor Indefinido (Sem Pedido)';
              if (setoresManuais[nf.id]) {
                centroCusto = setoresManuais[nf.id];
              } else if (pedidoRelacionado) {
                centroCusto = pedidoRelacionado.centroCusto;
              }
              
              return {
                ...nf,
                pedido: pedidoRelacionado,
                centroCusto,
                diasAtraso: calcularDiasAtraso(nf.data)
              };
            });
          }, [nfs, pedidos, vinculos, setoresManuais]);

          const setores = useMemo(() => Array.from(new Set(nfsMapeadas.map(n => n.centroCusto))).sort(), [nfsMapeadas]);
          const setoresDisponiveis = useMemo(() => Array.from(new Set(pedidos.map(p => p.centroCusto))).filter(Boolean).sort(), [pedidos]);

          const kpis = useMemo(() => {
            const notasParaConciliar = nfsMapeadas.filter(n => !n.pedido).length;
            const pendentesFiscal = nfsMapeadas.filter(n => n.pedido && !dadosFiscais[n.id]);
            const concluidas = nfsMapeadas.filter(n => dadosFiscais[n.id]);
            
            return {
              notasParaConciliar,
              pendentesFiscal: pendentesFiscal.length,
              totalConcluidas: concluidas.length,
              progresso: nfsMapeadas.length > 0 ? Math.round((concluidas.length / nfsMapeadas.length) * 100) : 0
            };
          }, [nfsMapeadas, dadosFiscais]);

          const topSetoresPendentes = useMemo(() => {
            const agrupamento = {};
            nfsMapeadas.forEach(nf => {
              if (!dadosFiscais[nf.id]) {
                const setor = nf.centroCusto;
                if (!agrupamento[setor]) agrupamento[setor] = { qtde: 0, valor: 0 };
                agrupamento[setor].qtde += 1;
                agrupamento[setor].valor += nf.valor;
              }
            });
            return Object.entries(agrupamento)
              .map(([nome, dados]) => ({ nome: nome.split(' - ')[1] || nome, ...dados }))
              .sort((a, b) => b.valor - a.valor)
              .slice(0, 5);
          }, [nfsMapeadas, dadosFiscais]);

          // --- Handlers ---
          const handleAbrirDetalhes = (nf) => {
            setNfSelecionada(nf);
            setIsEditingNfInfo(false);
            setEditSetor(setoresManuais[nf.id] || '');
            setSearchPedidoStr('');
          };

          const handleVincularManual = (nfId, pedidoId) => {
            setVinculos([...vinculos, { nfId, pedidoId, data: new Date().toISOString() }]);
          };

          const handleSalvarFiscal = () => {
            if (!formFiscalNome || !formFiscalFile) return;

            setDadosFiscais(prev => ({
              ...prev,
              [modalFiscalOpen]: {
                nome: formFiscalNome,
                photo: null,
                observacao: formFiscalObs,
                fileName: formFiscalFile.name,
                fileUrl: URL.createObjectURL(formFiscalFile),
                data: new Date().toLocaleDateString('pt-BR')
              }
            }));
            setModalFiscalOpen(null);
            setFormFiscalNome('');
            setFormFiscalObs('');
            setFormFiscalFile(null);
          };

          // --- Renderizações de Modais ---
          const renderModalLancarFiscal = () => {
            if (!modalFiscalOpen) return null;
            return (
              <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[200] flex items-center justify-center p-4 animate-fade-in">
                <div className="bg-white rounded-[24px] w-full max-w-md shadow-2xl overflow-hidden flex flex-col transform transition-all animate-slide-up border border-slate-200/50">
                  <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-gradient-to-r from-blue-700 to-indigo-700">
                    <h2 className="text-lg font-semibold text-white flex items-center gap-2">
                      <FileCheck2 size={20} /> Enviar para Lançamento Fiscal
                    </h2>
                    <button onClick={() => setModalFiscalOpen(null)} className="p-1.5 text-white/70 hover:text-white bg-white/10 hover:bg-white/20 rounded-xl transition-colors">
                      <X size={18} />
                    </button>
                  </div>
                  <div className="p-6 space-y-6 bg-slate-50/50">
                    <div className="bg-amber-50 border border-amber-200/60 p-4 rounded-2xl flex gap-3 items-start">
                      <AlertTriangle className="text-amber-500 shrink-0 mt-0.5" size={18} />
                      <p className="text-sm text-amber-800 font-medium">Identifique-se e anexe o comprovante (print do e-mail de aprovação) para prosseguir.</p>
                    </div>

                    <div>
                      <label className="block text-sm font-semibold text-slate-700 mb-2">Seu Nome / Assinatura</label>
                      <div className="relative group">
                        <UserCircle2 className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-indigo-600 transition-colors" size={18} />
                        <input 
                          type="text" 
                          placeholder="Digite seu nome ou setor..." 
                          value={formFiscalNome}
                          onChange={(e) => setFormFiscalNome(e.target.value)}
                          className="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-400 font-medium shadow-sm"
                        />
                      </div>
                    </div>
                    
                    <div>
                      <label className="block text-sm font-semibold text-slate-700 mb-2">Observação / Informação Extra (Opcional)</label>
                      <textarea 
                        rows="2"
                        placeholder="Deixe um recado sobre este lançamento..." 
                        value={formFiscalObs}
                        onChange={(e) => setFormFiscalObs(e.target.value)}
                        className="w-full p-3 bg-white border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-400 font-medium shadow-sm resize-none"
                      />
                    </div>
                    
                    <div>
                      <label className="block text-sm font-semibold text-slate-700 mb-2">Comprovante de E-mail</label>
                      <div className={`border-2 border-dashed rounded-2xl p-6 transition-all cursor-pointer text-center relative group ${formFiscalFile ? 'bg-indigo-50 border-indigo-300' : 'bg-white border-slate-300 hover:bg-slate-50 hover:border-indigo-400'}`}>
                        <input 
                          type="file" 
                          className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"
                          accept="image/*,.pdf"
                          onChange={(e) => setFormFiscalFile(e.target.files[0])}
                        />
                        <div className="relative z-0 flex flex-col items-center pointer-events-none">
                            <div className={`w-12 h-12 rounded-full flex items-center justify-center mb-3 transition-colors ${formFiscalFile ? 'bg-indigo-100 text-indigo-600' : 'bg-slate-100 text-slate-500 group-hover:text-indigo-500 group-hover:bg-indigo-50'}`}>
                                <Camera size={24} />
                            </div>
                            {formFiscalFile ? (
                            <p className="text-sm font-semibold text-indigo-700 truncate w-full px-2">{formFiscalFile.name}</p>
                            ) : (
                            <>
                                <p className="text-sm font-semibold text-slate-700">Clique para anexar o arquivo</p>
                                <p className="text-xs text-slate-500 mt-1">Imagens (PNG, JPG) ou PDF</p>
                            </>
                            )}
                        </div>
                      </div>
                    </div>
                  </div>
                  <div className="p-5 border-t border-slate-100 bg-white flex justify-end gap-3">
                    <button onClick={() => setModalFiscalOpen(null)} className="px-5 py-2.5 text-sm font-semibold text-slate-600 hover:bg-slate-100 rounded-xl transition-colors">Cancelar</button>
                    <button 
                      onClick={handleSalvarFiscal}
                      disabled={!formFiscalNome || !formFiscalFile}
                      className="px-6 py-2.5 bg-slate-900 text-white text-sm font-semibold rounded-xl hover:bg-slate-800 disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-sm flex items-center gap-2"
                    >
                      Confirmar Lançamento <CheckCircle2 size={16} />
                    </button>
                  </div>
                </div>
              </div>
            );
          };

          const renderModalDetalhesNF = () => {
            if (!nfSelecionada) return null;
            const anexoPDF = anexosNf[nfSelecionada.id];
            const pedContext = nfSelecionada.pedido;

            return (
              <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] flex items-center justify-center p-4 animate-fade-in">
                <div className="bg-white rounded-[24px] w-full max-w-4xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh] animate-slide-up border border-slate-200/50">
                  
                  {/* Modal Header */}
                  <div className="p-6 md:p-8 border-b border-slate-100 flex justify-between items-start bg-white">
                    <div>
                      <div className="flex flex-wrap items-center gap-3 mb-3">
                        <span className="text-xs font-bold px-3 py-1.5 bg-slate-100 text-slate-700 rounded-lg tracking-wide border border-slate-200/60">Nota Fiscal Nº {nfSelecionada.numero}</span>
                        <span className={`text-xs font-bold px-3 py-1.5 rounded-lg tracking-wide flex items-center gap-1.5 ${nfSelecionada.diasAtraso > 15 ? 'bg-rose-50 text-rose-700 border border-rose-200' : 'bg-amber-50 text-amber-700 border border-amber-200'}`}>
                          <Clock size={14}/> Aguardando há {nfSelecionada.diasAtraso} dias
                        </span>
                      </div>
                      <h2 className="text-2xl md:text-3xl font-bold text-slate-900 tracking-tight">{nfSelecionada.nome}</h2>
                      <div className="mt-3 space-y-1.5">
                        <p className="text-sm text-slate-600 font-medium flex items-center gap-2"><Building2 size={14} className="text-slate-400"/> CNPJ: {formatCnpj(nfSelecionada.cnpj)}</p>
                        {nfSelecionada.chaveAcesso && (
                          <p className="text-xs text-slate-500 font-mono flex items-center gap-2"><span className="font-semibold text-slate-600 font-sans">Chave de Acesso:</span> {formatChave(nfSelecionada.chaveAcesso)}</p>
                        )}
                      </div>
                    </div>
                    <button onClick={() => setNfSelecionada(null)} className="p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-400 hover:text-slate-700 hover:bg-slate-100 transition-colors">
                      <X size={20} />
                    </button>
                  </div>

                  {/* Modal Body */}
                  <div className="p-6 md:p-8 overflow-y-auto flex-1 space-y-8 bg-slate-50/50">
                    
                    {/* Seção Pedido Referência */}
                    <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                      <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 mb-5 pb-5 border-b border-slate-100">
                        <h3 className="text-sm font-bold text-slate-800 flex items-center gap-2 uppercase tracking-wide">
                          <Building2 size={18} className="text-blue-600" /> Referência Origem (Pedido)
                        </h3>
                        <button
                          onClick={() => setIsEditingNfInfo(!isEditingNfInfo)}
                          className={`flex items-center justify-center gap-2 px-4 py-2 rounded-xl text-xs font-semibold transition-colors ${isEditingNfInfo ? 'bg-slate-100 text-slate-600' : 'bg-blue-50 hover:bg-blue-100 text-blue-700'}`}
                        >
                          {isEditingNfInfo ? <><X size={14} /> Cancelar Ajuste</> : <><Pencil size={14} /> Ajustar Vínculo / Setor</>}
                        </button>
                      </div>

                      {isEditingNfInfo ? (
                        <div className="space-y-6 animate-fade-in">
                          <div className="bg-slate-50 p-5 rounded-xl border border-slate-200">
                            <label className="text-xs font-bold text-slate-500 uppercase tracking-wide mb-3 block">Opção A: Forçar Centro de Custo</label>
                            <div className="flex flex-col md:flex-row gap-3">
                              <select value={editSetor} onChange={e => setEditSetor(e.target.value)} className="flex-1 p-3 bg-white border border-slate-300 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none font-medium text-slate-700 shadow-sm">
                                  <option value="">-- Herdar Centro de Custo do Pedido --</option>
                                  {setoresDisponiveis.map((s, idx) => <option key={`opt-${idx}`} value={s}>{s}</option>)}
                              </select>
                              <button
                                  onClick={() => {
                                      setSetoresManuais(prev => { const next = { ...prev }; if (editSetor) next[nfSelecionada.id] = editSetor; else delete next[nfSelecionada.id]; return next; });
                                      setIsEditingNfInfo(false);
                                  }}
                                  className="bg-slate-900 hover:bg-slate-800 text-white px-5 py-3 rounded-xl text-sm font-semibold transition-colors shadow-sm whitespace-nowrap"
                              >
                                Salvar Setor
                              </button>
                            </div>
                          </div>

                          <div className="bg-slate-50 p-5 rounded-xl border border-slate-200">
                            <label className="text-xs font-bold text-slate-500 uppercase tracking-wide mb-3 block">Opção B: Vincular Número do Pedido</label>
                            <div className="relative">
                                <Search className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400" size={18}/>
                                <input type="text" placeholder="Buscar por fornecedor ou número do pedido..." value={searchPedidoStr} onChange={e => setSearchPedidoStr(e.target.value)} className="w-full pl-10 p-3 bg-white border border-slate-300 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none font-medium shadow-sm"/>
                            </div>
                            {searchPedidoStr.length > 1 && (
                                <div className="mt-3 max-h-48 overflow-y-auto border border-slate-200 rounded-xl bg-white shadow-md divide-y divide-slate-100">
                                    {pedidos.filter(p => p.numeroPedido.includes(searchPedidoStr) || p.fornecedor.toLowerCase().includes(searchPedidoStr.toLowerCase())).map((p, idx) => (
                                        <div key={`src-ped-${p.id}-${idx}`} className="flex flex-col sm:flex-row justify-between sm:items-center p-3 gap-3 hover:bg-slate-50 transition-colors">
                                            <div>
                                                <p className="text-sm font-bold text-slate-800">Pedido {p.numeroPedido}</p>
                                                <p className="text-xs text-slate-500 truncate max-w-xs">{p.fornecedor}</p>
                                            </div>
                                            <button onClick={() => { handleVincularManual(nfSelecionada.id, p.id); setIsEditingNfInfo(false); }} className="bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-semibold px-4 py-2 rounded-lg flex items-center justify-center gap-1.5 transition-colors shadow-sm"><Link2 size={14}/> Aplicar Vínculo</button>
                                        </div>
                                    ))}
                                </div>
                            )}
                          </div>
                        </div>
                      ) : pedContext ? (
                        <div className="grid grid-cols-1 lg:grid-cols-4 gap-6 relative">
                          <div className="lg:col-span-2">
                            <p className="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-2">Descrição do Material</p>
                            <p className="text-sm font-medium text-slate-800 leading-relaxed bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-inner">{pedContext.descricao}</p>
                            <div className="flex flex-wrap items-center gap-2 mt-4">
                              <span className="text-xs bg-slate-100 border border-slate-200 px-2.5 py-1.5 rounded-lg font-semibold text-slate-700 flex items-center gap-1.5"><TableProperties size={14}/> Pedido {pedContext.numeroPedido}</span>
                              <span className="text-xs bg-indigo-50 border border-indigo-100 text-indigo-700 px-2.5 py-1.5 rounded-lg font-semibold flex items-center gap-1.5"><Building2 size={14}/> {pedContext.centroCusto}</span>
                            </div>
                          </div>
                          <div>
                            <p className="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-2">Quantidade</p>
                            <p className="text-sm font-bold text-slate-800 bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-inner inline-block">{pedContext.quantidade} UND</p>
                          </div>
                          <div className="lg:text-right">
                            <p className="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-2">Valor Autorizado</p>
                            <p className="text-xl font-black text-emerald-600">{formatCurrency(pedContext.valor)}</p>
                          </div>
                        </div>
                      ) : (
                        <div className="bg-amber-50 border border-amber-200/60 rounded-xl p-5 flex items-start gap-4">
                          <div className="bg-amber-100 text-amber-600 p-2 rounded-lg shrink-0"><AlertCircle size={24}/></div>
                          <div className="flex-1">
                              <p className="text-sm font-bold text-amber-900">Nota Fiscal sem Pedido vinculado</p>
                              <p className="text-sm text-amber-700 mt-1">O sistema não conseguiu cruzar o CNPJ desta fatura com os pedidos recentes.</p>
                              
                              {nfSelecionada.descricaoMaterial && (
                                <div className="mt-4 bg-white/60 p-4 rounded-xl border border-amber-200/60">
                                  <p className="text-[10px] font-bold text-amber-800 uppercase tracking-wider mb-1">Descrição que veio na Nota Fiscal:</p>
                                  <p className="text-sm font-medium text-amber-900 leading-relaxed">{nfSelecionada.descricaoMaterial}</p>
                                </div>
                              )}

                              {setoresManuais[nfSelecionada.id] ? (
                                <div className="mt-4 inline-flex items-center gap-2 text-xs text-blue-700 bg-blue-50 border border-blue-100 px-3 py-2 rounded-lg font-semibold"><CheckCircle2 size={16} /> Encaminhada para: {setoresManuais[nfSelecionada.id]}</div>
                              ) : (
                                <p className="text-xs mt-3 text-amber-800 font-medium opacity-80">Use o botão de Ajuste acima para resolver a pendência.</p>
                              )}
                          </div>
                        </div>
                      )}
                    </div>

                    {/* Seção Dados Fiscais Lançados */}
                    {dadosFiscais[nfSelecionada.id] && (
                      <div>
                        <h3 className="text-sm font-bold text-slate-800 flex items-center gap-2 mb-4 uppercase tracking-wide"><CheckCircle2 size={18} className="text-emerald-500" /> Registro de Lançamento</h3>
                        <div className="bg-emerald-50 border border-emerald-200 rounded-2xl p-5 relative overflow-hidden">
                          <div className="absolute top-0 left-0 w-1.5 h-full bg-emerald-500"></div>
                          <div className="flex flex-col md:flex-row gap-5 items-start">
                            <div className="flex items-center gap-3 shrink-0">
                              {dadosFiscais[nfSelecionada.id].photo ? (
                                <img src={dadosFiscais[nfSelecionada.id].photo} className="w-10 h-10 rounded-full border border-emerald-200 shadow-sm object-cover" />
                              ) : (
                                <div className="w-10 h-10 rounded-full bg-emerald-200 text-emerald-700 flex items-center justify-center font-bold text-lg">{dadosFiscais[nfSelecionada.id].nome.charAt(0)}</div>
                              )}
                              <div>
                                <p className="text-xs text-emerald-600 font-bold uppercase">Aprovado por</p>
                                <p className="text-sm font-bold text-slate-800">{dadosFiscais[nfSelecionada.id].nome}</p>
                                <p className="text-[10px] text-slate-500 font-bold mt-0.5">{dadosFiscais[nfSelecionada.id].data}</p>
                              </div>
                            </div>
                            
                            {dadosFiscais[nfSelecionada.id].observacao && (
                              <div className="flex-1 w-full bg-white/60 p-3 rounded-xl border border-emerald-100/50">
                                <p className="text-[10px] font-bold text-slate-400 uppercase mb-1">Observação deixada</p>
                                <p className="text-sm font-medium text-slate-700 italic">"{dadosFiscais[nfSelecionada.id].observacao}"</p>
                              </div>
                            )}
                          </div>
                        </div>
                      </div>
                    )}

                    {/* Seção Cópia NF */}
                    <div>
                      <h3 className="text-sm font-bold text-slate-800 flex items-center gap-2 mb-4 uppercase tracking-wide"><FileText size={18} className="text-blue-600" /> Cópia da Nota Fiscal (PDF/Img)</h3>
                      {anexoPDF ? (
                        <div className="border border-slate-200 rounded-2xl p-4 bg-white shadow-sm flex flex-col sm:flex-row items-center justify-between gap-4 group hover:border-slate-300 transition-all">
                          <div className="flex items-center gap-4 w-full sm:w-auto">
                            <div className="w-14 h-14 rounded-xl flex items-center justify-center shrink-0 border border-slate-100 bg-slate-50 text-blue-600 shadow-sm">
                              {anexoPDF.type.includes('image') ? <FileImage size={24} /> : <FileBadge2 size={24} />}
                            </div>
                            <div className="min-w-0">
                              <p className="font-semibold text-slate-800 text-sm truncate max-w-[200px] sm:max-w-xs">{anexoPDF.name}</p>
                              <p className="text-xs font-semibold text-slate-400 mt-1 uppercase tracking-wider">{anexoPDF.size}</p>
                            </div>
                          </div>
                          <div className="flex items-center gap-2 w-full sm:w-auto justify-end">
                            <a href={anexoPDF.url} target="_blank" rel="noreferrer" className="flex items-center gap-2 px-4 py-2 bg-slate-50 hover:bg-slate-100 border border-slate-200 text-slate-700 rounded-xl text-sm font-semibold transition-colors"><Eye size={16} /> Visualizar</a>
                            <button onClick={() => setAnexosNf(prev => {const n = {...prev}; delete n[nfSelecionada.id]; return n;})} className="p-2.5 bg-rose-50 hover:bg-rose-100 text-rose-600 rounded-xl transition-colors"><Trash2 size={18} /></button>
                          </div>
                        </div>
                      ) : (
                        <div className="border-2 border-dashed border-slate-300 rounded-2xl p-8 bg-white hover:bg-slate-50 transition-colors flex flex-col items-center justify-center text-center cursor-pointer group relative">
                          <input type="file" className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" accept="image/*,.pdf" onChange={(e) => {
                              const file = e.target.files[0];
                              if (file) setAnexosNf(prev => ({ ...prev, [nfSelecionada.id]: { name: file.name, size: `${(file.size/1024/1024).toFixed(2)} MB`, type: file.type, url: URL.createObjectURL(file) } }));
                          }} />
                          <div className="w-12 h-12 bg-slate-100 text-slate-500 group-hover:text-blue-600 group-hover:bg-blue-50 rounded-full flex items-center justify-center mb-3 transition-colors"><UploadCloud size={24} /></div>
                          <p className="text-sm font-semibold text-slate-700">Clique ou arraste a nota fiscal</p>
                          <p className="text-xs text-slate-500 mt-1">Formatos suportados: PDF, JPG, PNG</p>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              </div>
            );
          };

          const renderSetores = () => (
            <div className="space-y-8 max-w-7xl mx-auto animate-fade-in pb-10">
              <div className="flex flex-col md:flex-row justify-between items-start md:items-end gap-6 mb-8">
                <div>
                  <h2 className="text-2xl md:text-3xl font-bold text-slate-900 tracking-tight">Análise & Cobrança Setorial</h2>
                  <p className="text-slate-500 mt-2 text-sm font-medium">Controle faturas recebidas, identifique a origem e automatize cobranças aos responsáveis.</p>
                </div>
                <div className="flex items-center gap-3 bg-white p-2 rounded-xl shadow-sm border border-slate-200 w-full md:w-auto">
                  <div className="pl-2 text-slate-400"><Filter size={18} /></div>
                  <select value={filtroSetor} onChange={(e) => setFiltroSetor(e.target.value)} className="bg-transparent border-none w-full md:w-auto pr-6 py-1 text-slate-700 font-semibold text-sm focus:outline-none cursor-pointer">
                    <option value="Todos">Todos os Centros de Custo</option>
                    {setores.map((s, idx) => <option key={`filtro-${idx}`} value={s}>{s}</option>)}
                  </select>
                </div>
              </div>

              <div className="space-y-8">
                {setores.filter(s => filtroSetor === 'Todos' || s === filtroSetor).map((setor, idx) => {
                  const nfsDoSetor = nfsMapeadas.filter(n => n.centroCusto === setor);
                  const nfsAtrasadas = nfsDoSetor.filter(nf => !dadosFiscais[nf.id]);
                  const progressoSetor = nfsDoSetor.length > 0 ? Math.round(((nfsDoSetor.length - nfsAtrasadas.length) / nfsDoSetor.length) * 100) : 0;
                  const emailSetor = emailsSetores[setor] || "";
                  
                  let mailtoLink = '#';
                  if (emailSetor && nfsAtrasadas.length > 0) {
                    const listaPendentes = nfsAtrasadas.slice(0, 15).map(nf => `-> NF: ${nf.numero} - ${formatCurrency(nf.valor)}`).join('\n');
                    const body = `Olá equipe do setor ${setor},\n\nTemos notas fiscais aguardando a sua validação / lançamento fiscal para pagamento:\n\n${listaPendentes}\n\nPor favor, acessem o painel ou respondam com o de acordo.\n\nEquipe Financeira`;
                    mailtoLink = `mailto:${emailSetor}?subject=Ação Necessária: Lançamento Fiscal Pendente&body=${encodeURIComponent(body)}`;
                  }

                  return (
                    <div key={`setor-card-${idx}`} className="bg-white rounded-3xl p-6 md:p-8 border border-slate-200 shadow-sm relative overflow-hidden">
                      {/* Decoração sutil de fundo */}
                      <div className="absolute top-0 right-0 p-12 opacity-5 pointer-events-none">
                        <Building2 size={120} />
                      </div>
                      
                      <div className="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-8 gap-6 relative z-10">
                        <div className="flex-1 w-full">
                          <h3 className="font-bold text-slate-800 text-xl lg:text-2xl tracking-tight mb-3 flex items-center gap-2">
                             {setor}
                          </h3>
                          <div className="flex items-center gap-4 w-full max-w-sm">
                            <div className="w-full bg-slate-100 rounded-full h-2 overflow-hidden border border-slate-200/60">
                              <div className={`h-full rounded-full transition-all duration-1000 ${progressoSetor === 100 ? 'bg-emerald-500' : 'bg-gradient-to-r from-blue-500 to-indigo-600'}`} style={{ width: `${progressoSetor}%` }}></div>
                            </div>
                            <span className="text-xs font-bold text-slate-500 whitespace-nowrap">{progressoSetor}% Concluído</span>
                          </div>
                        </div>
                        
                        <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-3 w-full lg:w-auto bg-slate-50 p-2.5 rounded-2xl border border-slate-200">
                          <div className="relative group flex-1 sm:w-72">
                            <Mail className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-blue-600 transition-colors" size={16} />
                            <input type="email" placeholder="E-mail do responsável pelo setor..." value={emailsSetores[setor] || ''} onChange={(e) => setEmailsSetores(prev => ({ ...prev, [setor]: e.target.value }))} className="w-full pl-10 pr-4 py-2.5 bg-white border border-slate-200 rounded-xl text-sm font-medium focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all shadow-sm"/>
                          </div>
                          <a href={mailtoLink} onClick={(e) => { if(!emailSetor || nfsAtrasadas.length === 0) e.preventDefault(); }} className={`flex justify-center items-center gap-2 px-6 py-2.5 rounded-xl text-sm font-semibold transition-all shadow-sm shrink-0 ${emailSetor && nfsAtrasadas.length > 0 ? 'bg-slate-900 hover:bg-slate-800 text-white' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}>
                            <Send size={16} /> Cobrar Setor
                          </a>
                        </div>
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5 relative z-10">
                        {nfsDoSetor.map((nf, nIdx) => {
                          const statusFiscal = dadosFiscais[nf.id];
                          return (
                            <div key={`nf-card-${nf.id}-${nIdx}`} className={`bg-slate-50 rounded-2xl border transition-all duration-300 flex flex-col justify-between overflow-hidden group hover:shadow-md ${statusFiscal ? 'border-emerald-200 bg-emerald-50/30' : 'border-slate-200 hover:border-blue-300'}`}>
                              <div onClick={() => handleAbrirDetalhes(nf)} className="p-5 cursor-pointer relative h-full flex flex-col">
                                <div className="flex justify-between items-start mb-4">
                                  <div className="min-w-0 pr-3 flex-1">
                                    <span className="text-[10px] font-bold text-slate-500 uppercase tracking-wider bg-white border border-slate-200 px-2 py-1 rounded-md shadow-sm inline-block mb-2">NF {nf.numero}</span>
                                    <p className="text-sm font-bold text-slate-800 line-clamp-1">{nf.nome}</p>
                                    {nf.chaveAcesso && (
                                        <p className="text-[9px] text-slate-400 font-mono mt-1 truncate" title={nf.chaveAcesso}>Chave: {nf.chaveAcesso}</p>
                                    )}
                                  </div>
                                  <div className="flex flex-col items-end shrink-0 gap-1.5 ml-2">
                                    <span className="text-base font-black text-slate-900 tracking-tight">{formatCurrency(nf.valor)}</span>
                                    {!statusFiscal && <span className="text-[10px] font-bold px-2 py-1 rounded border bg-white text-slate-600 border-slate-200 uppercase tracking-wider flex items-center gap-1"><Clock size={10}/> {nf.diasAtraso}d</span>}
                                  </div>
                                </div>
                                <div className="mt-auto pt-3 border-t border-slate-200/60 border-dashed">
                                  {nf.pedido ? (
                                    <div className="space-y-2">
                                      <div className="flex items-center gap-2 text-xs text-slate-500 font-semibold"><TableProperties size={14} className="text-blue-500"/> Ped. {nf.pedido.numeroPedido}</div>
                                      <p className="text-xs text-slate-600 line-clamp-2 leading-relaxed bg-white p-2.5 rounded-lg border border-slate-100 shadow-sm" title={nf.pedido.descricao}>{nf.pedido.descricao}</p>
                                    </div>
                                  ) : (
                                    <div className="space-y-2">
                                      <div className="flex items-center gap-2 text-xs text-amber-700 font-semibold"><AlertTriangle size={14} className="text-amber-500"/> Fatura sem pedido</div>
                                      {nf.descricaoMaterial && (
                                        <p className="text-xs text-slate-600 line-clamp-2 leading-relaxed bg-white p-2.5 rounded-lg border border-slate-100 shadow-sm" title={nf.descricaoMaterial}>{nf.descricaoMaterial}</p>
                                      )}
                                    </div>
                                  )}
                                </div>
                              </div>
                              <div className="p-4 bg-white border-t border-slate-200/60 flex items-center justify-between">
                                {statusFiscal ? (
                                  <div className="flex items-center justify-between w-full">
                                    <div className="flex items-center gap-1.5"><CheckCircle2 size={16} className="text-emerald-500"/><p className="text-xs font-bold text-slate-700">Lançado no Fiscal</p></div>
                                    <a href={statusFiscal.fileUrl} target="_blank" rel="noreferrer" className="text-[11px] font-bold text-blue-600 hover:text-blue-800 transition-colors uppercase tracking-wider">Ver Print</a>
                                  </div>
                                ) : (
                                  <button onClick={(e) => { e.stopPropagation(); setModalFiscalOpen(nf.id); }} className="w-full flex items-center justify-center gap-2 py-1.5 text-sm font-semibold text-slate-600 group-hover:text-blue-700 transition-all">Registrar Lançamento <ChevronRight size={16}/></button>
                                )}
                              </div>
                            </div>
                          )
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );

          const renderConciliacao = () => {
            const nfsSemPedido = nfsMapeadas.filter(nf => !nf.pedido && !setoresManuais[nf.id]);
            
            return (
              <div className="space-y-8 max-w-7xl mx-auto animate-fade-in pb-10">
                <div className="mb-8">
                  <h2 className="text-2xl md:text-3xl font-bold text-slate-900 tracking-tight">Conciliação Inteligente</h2>
                  <p className="text-slate-500 mt-2 text-sm font-medium">Encontramos {nfsSemPedido.length} notas sem pedido de origem ou setor vinculado. Revise as sugestões automáticas abaixo.</p>
                </div>
                
                <div className="space-y-6">
                  {nfsSemPedido.length === 0 ? (
                    <div className="bg-emerald-50 border border-emerald-200 rounded-3xl p-10 text-center flex flex-col items-center">
                      <CheckCircle2 size={48} className="text-emerald-500 mb-4" />
                      <h3 className="text-xl font-bold text-slate-800">Tudo Conciliado!</h3>
                      <p className="text-slate-500 mt-2">Todas as faturas ativas já possuem um vínculo de pedido ou setor manual.</p>
                    </div>
                  ) : nfsSemPedido.map((nf) => {
                    // Smart match: primeiros 8 digitos do CNPJ (raiz matriz/filial) ou primeira palavra do nome
                    const rootCnpj = cleanCnpj(nf.cnpj).substring(0, 8);
                    const primeiroNome = nf.nome.split(' ')[0].toLowerCase();
                    
                    const sugestoes = pedidos.filter(p => {
                      const pCnpj = cleanCnpj(p.cnpj);
                      return (pCnpj && pCnpj.startsWith(rootCnpj)) || 
                             (p.fornecedor && p.fornecedor.toLowerCase().includes(primeiroNome));
                    }).slice(0, 3);

                    return (
                      <div key={`concil-${nf.id}`} className="bg-white rounded-3xl p-6 border border-slate-200 shadow-sm flex flex-col xl:flex-row gap-6 items-start">
                        <div className="xl:w-1/3 w-full shrink-0">
                          <div className="flex items-center gap-2 mb-3">
                            <span className="text-[10px] font-bold text-slate-500 uppercase tracking-wider bg-slate-100 px-2.5 py-1 rounded-md">NF {nf.numero}</span>
                            <span className="text-[10px] font-bold text-amber-700 bg-amber-50 border border-amber-200 px-2.5 py-1 rounded-md flex items-center gap-1"><AlertTriangle size={12}/> Pendente</span>
                          </div>
                          <h4 className="text-base font-bold text-slate-800 leading-tight mb-1">{nf.nome}</h4>
                          <p className="text-xs text-slate-500 font-medium">CNPJ: {formatCnpj(nf.cnpj)}</p>
                          {nf.chaveAcesso && (
                            <p className="text-[10px] text-slate-400 font-mono mt-1 mb-2 break-all">Chave: {nf.chaveAcesso}</p>
                          )}
                          <p className="text-2xl font-black text-slate-900 tracking-tight mt-2">{formatCurrency(nf.valor)}</p>
                          {nf.descricaoMaterial && (
                            <div className="mt-4 p-3 bg-slate-50 rounded-xl border border-slate-100">
                                <p className="text-[10px] font-bold text-slate-500 uppercase mb-1">Descrição na Nota:</p>
                                <p className="text-xs font-medium text-slate-700">{nf.descricaoMaterial}</p>
                            </div>
                          )}
                        </div>
                        
                        <div className="flex-1 w-full bg-slate-50 p-5 rounded-2xl border border-slate-100">
                          <p className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4 flex items-center gap-2"><Wand2 size={14} className="text-indigo-500"/> Sugestões do Sistema</p>
                          
                          {sugestoes.length > 0 ? (
                            <div className="space-y-3">
                              {sugestoes.map(ped => (
                                <div key={`sug-${ped.id}`} className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 p-4 bg-white border border-slate-200 rounded-xl shadow-sm hover:border-indigo-300 transition-colors">
                                  <div>
                                    <div className="flex items-center gap-2 mb-1">
                                      <p className="text-sm font-bold text-slate-800">Pedido {ped.numeroPedido}</p>
                                      <span className="text-[10px] font-semibold text-indigo-700 bg-indigo-50 px-2 py-0.5 rounded-full">{ped.centroCusto}</span>
                                    </div>
                                    <p className="text-xs text-slate-500 line-clamp-1">{ped.fornecedor} • {formatCurrency(ped.valor)}</p>
                                  </div>
                                  <button onClick={() => handleVincularManual(nf.id, ped.id)} className="shrink-0 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-semibold px-4 py-2 rounded-lg flex items-center justify-center gap-2 transition-colors">
                                    <Link2 size={14}/> Vincular Rápido
                                  </button>
                                </div>
                              ))}
                            </div>
                          ) : (
                            <div className="text-center py-6 px-4">
                              <p className="text-sm font-medium text-slate-500 mb-3">Nenhuma correspondência óbvia encontrada pelo CNPJ ou Nome.</p>
                            </div>
                          )}
                          
                          <div className="mt-4 pt-4 border-t border-slate-200">
                            <button onClick={() => { setActiveTab('setores'); handleAbrirDetalhes(nf); }} className="text-sm font-semibold text-indigo-600 hover:text-indigo-800 flex items-center gap-1.5 transition-colors">
                              <Search size={16}/> Buscar manualmente em todos os pedidos
                            </button>
                          </div>
                        </div>
                      </div>
                    )
                  })}
                </div>
              </div>
            );
          };

          // Restaurado: Função de renderização do Dashboard 
          const renderDashboard = () => (
            <div className="space-y-8 max-w-7xl mx-auto animate-fade-in">
              <div className="mb-8">
                <h2 className="text-2xl md:text-3xl font-bold text-slate-900 tracking-tight">Dashboard Executivo</h2>
                <p className="text-slate-500 mt-2 text-sm font-medium">Visão holística de gargalos e performance do fechamento fiscal.</p>
              </div>
              
              <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-5">
                <div className="bg-white rounded-[24px] p-6 border border-slate-200 shadow-sm flex flex-col justify-between">
                  <div className="flex justify-between items-start mb-4">
                    <p className="text-xs font-bold text-slate-500 uppercase tracking-wider">Aguardando Conciliação</p>
                    <div className="p-2 bg-slate-50 rounded-lg"><TableProperties size={18} className="text-slate-400" /></div>
                  </div>
                  <h3 className="text-4xl font-black text-slate-800">{kpis.notasParaConciliar}</h3>
                </div>
                
                <div className="bg-white rounded-[24px] p-6 border border-slate-200 shadow-sm flex flex-col justify-between">
                  <div className="flex justify-between items-start mb-4">
                    <p className="text-xs font-bold text-rose-500 uppercase tracking-wider">Pendentes de Fiscal</p>
                    <div className="p-2 bg-rose-50 rounded-lg"><AlertTriangle size={18} className="text-rose-500" /></div>
                  </div>
                  <h3 className="text-4xl font-black text-slate-800">{kpis.pendentesFiscal}</h3>
                </div>
                
                <div className="bg-slate-900 rounded-[24px] p-6 shadow-lg shadow-slate-900/10 text-white relative overflow-hidden xl:col-span-2 flex flex-col justify-between">
                  <div className="absolute right-0 bottom-0 opacity-10 pointer-events-none transform translate-x-4 translate-y-4">
                     <TrendingUp size={160} />
                  </div>
                  <div className="relative z-10">
                    <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Índice Global de Resolução</p>
                    <div className="flex items-end gap-3">
                      <h3 className="text-6xl font-black text-white tracking-tighter leading-none">{kpis.progresso}%</h3>
                      <span className="text-sm font-medium text-slate-400 mb-1">das NFs processadas</span>
                    </div>
                  </div>
                  <div className="relative z-10 w-full bg-white/10 rounded-full h-1.5 mt-6 overflow-hidden">
                     <div className="h-full bg-emerald-400 rounded-full" style={{ width: `${kpis.progresso}%` }}></div>
                  </div>
                </div>
              </div>

              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 pt-4">
                <div className="lg:col-span-2 bg-white rounded-[24px] border border-slate-200 p-6 md:p-8 shadow-sm">
                  <div className="flex items-center justify-between mb-8">
                     <h3 className="text-base font-bold text-slate-800 flex items-center gap-2"><TrendingUp size={18} className="text-blue-500"/> Ofensores por Centro de Custo</h3>
                     <span className="text-xs font-semibold text-slate-500 bg-slate-100 px-3 py-1 rounded-full">Por Volume Financeiro</span>
                  </div>
                  <div className="h-72 w-full">
                    <ResponsiveContainer width="100%" height="100%">
                      <BarChart data={topSetoresPendentes} margin={{ top: 10, right: 10, left: 0, bottom: 0 }}>
                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                        <XAxis dataKey="nome" axisLine={false} tickLine={false} tick={{ fontSize: 11, fill: '#64748b', fontWeight: 600 }} dy={10} />
                        <YAxis axisLine={false} tickLine={false} tick={{ fontSize: 11, fill: '#94a3b8', fontWeight: 500 }} tickFormatter={(val) => `R$ ${val/1000}k`} />
                        <RechartsTooltip cursor={{fill: '#f8fafc'}} contentStyle={{borderRadius: '12px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1)'}} formatter={(value) => [formatCurrency(value), 'Pendente']} />
                        <Bar dataKey="valor" radius={[6, 6, 0, 0]} barSize={40}>
                          {topSetoresPendentes.map((entry, index) => <Cell key={`cell-bar-${index}`} fill={index === 0 ? '#f43f5e' : '#3b82f6'} />)}
                        </Bar>
                      </BarChart>
                    </ResponsiveContainer>
                  </div>
                </div>

                <div className="bg-white rounded-[24px] border border-slate-200 p-6 md:p-8 shadow-sm flex flex-col">
                  <h3 className="text-base font-bold text-slate-800 mb-6 flex items-center gap-2"><Clock size={18} className="text-blue-500"/> Resumo Rápido</h3>
                  <div className="flex-1 flex flex-col justify-center space-y-6">
                    <div className="flex items-center justify-between border-b border-slate-100 pb-4">
                      <span className="text-sm font-medium text-slate-500">Total NFs Base</span>
                      <span className="text-lg font-black text-slate-800">{nfsMapeadas.length}</span>
                    </div>
                    <div className="flex items-center justify-between border-b border-slate-100 pb-4">
                      <span className="text-sm font-medium text-slate-500">Finalizadas (Com Fiscal)</span>
                      <span className="text-lg font-black text-emerald-600">{kpis.totalConcluidas}</span>
                    </div>
                    <div className="flex items-center justify-between">
                      <span className="text-sm font-medium text-slate-500">Pendentes</span>
                      <span className="text-lg font-black text-rose-600">{kpis.notasParaConciliar + kpis.pendentesFiscal}</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          );

          if (loading) {
            return (
              <div className="min-h-screen bg-[#F8FAFC] flex flex-col items-center justify-center font-sans">
                <div className="w-16 h-16 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mb-6"></div>
                <h2 className="text-xl font-bold text-slate-800 tracking-tight">Sincronizando Base de Dados</h2>
                <p className="text-sm text-slate-500 mt-2 font-medium">Isso pode levar alguns segundos...</p>
              </div>
            );
          }

          if (error) {
            return (
              <div className="min-h-screen bg-[#F8FAFC] flex flex-col items-center justify-center font-sans">
                <div className="p-6 bg-rose-50 text-rose-500 rounded-3xl mb-6 shadow-sm border border-rose-100"><AlertCircle size={48} /></div>
                <h2 className="text-xl font-bold text-slate-800">Falha de Conexão</h2>
                <p className="text-slate-500 mt-3 max-w-sm text-center text-sm">{error}</p>
                <button onClick={() => window.location.reload()} className="mt-8 px-6 py-3 bg-slate-900 hover:bg-slate-800 text-white rounded-xl text-sm font-semibold shadow-sm transition-colors">Tentar Novamente</button>
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-[#F8FAFC] flex overflow-hidden font-sans text-slate-900">
              {renderModalDetalhesNF()}
              {renderModalLancarFiscal()}
              
              {/* Sidebar PRO */}
              <aside className={`fixed lg:static inset-y-0 left-0 z-50 w-72 bg-white border-r border-slate-200 flex flex-col transition-all duration-300 ease-in-out shadow-sm ${!isSidebarOpen ? '-translate-x-full lg:translate-x-0 lg:w-20' : 'translate-x-0'}`}>
                <div className="h-20 flex items-center justify-between px-6 border-b border-slate-100 shrink-0">
                  {isSidebarOpen ? (
                    <div className="flex items-center gap-2">
                      <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-sm">O</div>
                      <h2 className="font-bold text-lg text-slate-900 tracking-tight">OpFinance</h2>
                    </div>
                  ) : (
                    <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-sm mx-auto">O</div>
                  )}
                  <button className="lg:hidden p-2 text-slate-400 hover:text-slate-600" onClick={() => setIsSidebarOpen(false)}><X size={20} /></button>
                </div>
                
                <nav className="flex-1 overflow-y-auto py-6 px-4 space-y-1">
                  <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-semibold transition-colors ${activeTab === 'dashboard' ? 'bg-slate-900 text-white shadow-md' : 'text-slate-500 hover:bg-slate-100 hover:text-slate-800'}`}>
                    <LayoutDashboard size={18} />
                    {isSidebarOpen && <span>Dashboard Executivo</span>}
                  </button>
                  <button onClick={() => setActiveTab('setores')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-semibold transition-colors ${activeTab === 'setores' ? 'bg-slate-900 text-white shadow-md' : 'text-slate-500 hover:bg-slate-100 hover:text-slate-800'}`}>
                    <Building2 size={18} />
                    {isSidebarOpen && <span>Ação & Cobrança</span>}
                  </button>
                  <button onClick={() => setActiveTab('conciliacao')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-semibold transition-colors ${activeTab === 'conciliacao' ? 'bg-slate-900 text-white shadow-md' : 'text-slate-500 hover:bg-slate-100 hover:text-slate-800'}`}>
                    <Wand2 size={18} />
                    {isSidebarOpen && <span>Conciliação Inteligente</span>}
                  </button>
                </nav>
                
                {isSidebarOpen && (
                  <div className="p-4 border-t border-slate-100">
                    <a href="https://docs.google.com/spreadsheets/d/1mWmng3rSj5l1DhYp5CSuj9sIh0aemrEJ5ZPzTTgYc1I/" target="_blank" rel="noreferrer" className="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-semibold text-slate-600 bg-slate-50 hover:bg-slate-100 border border-slate-200 transition-colors">
                      <TableProperties size={18} /><span>Acessar Base de Dados</span>
                    </a>
                  </div>
                )}
              </aside>

              {/* Main Content */}
              <main className="flex-1 flex flex-col h-screen overflow-hidden relative">
                {/* Header Glassmorphism */}
                <header className="h-20 glass-panel flex items-center justify-between px-6 md:px-10 shrink-0 z-40 sticky top-0">
                  <div className="flex items-center gap-4">
                    <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="text-slate-500 hover:text-slate-800 transition-colors bg-white/50 p-2 rounded-lg border border-slate-200/50"><Menu size={20} /></button>
                    <h1 className="text-lg font-bold text-slate-800 tracking-tight hidden sm:block">{activeTab === 'dashboard' ? 'Painel Analítico' : activeTab === 'conciliacao' ? 'Conciliação Rápida' : 'Cobrança Operacional'}</h1>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="w-9 h-9 rounded-full bg-slate-200 flex items-center justify-center text-slate-500 border border-slate-300">
                      <UserCircle2 size={20} />
                    </div>
                  </div>
                </header>
                
                <div className="flex-1 overflow-y-auto p-6 md:p-10 scroll-smooth">
                  <div className="h-full">
                    {activeTab === 'dashboard' && renderDashboard()}
                    {activeTab === 'setores' && renderSetores()}
                    {activeTab === 'conciliacao' && renderConciliacao()}
                  </div>
                </div>
              </main>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
