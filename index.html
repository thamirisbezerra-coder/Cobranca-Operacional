<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cobrança Operacional PRO</title>
    
    <!-- Fonte Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out forwards',
                        'slide-up': 'slideUp 0.4s ease-out forwards',
                        'toast-in': 'toastIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        toastIn: { '0%': { transform: 'translateY(100%)', opacity: 0 }, '100%': { transform: 'translateY(0)', opacity: 1 } }
                    }
                }
            }
        }
    </script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Import Map -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0",
        "recharts": "https://esm.sh/recharts@2.10.3?bundle&deps=react@18.2.0,react-dom@18.2.0",
        "lodash": "https://esm.sh/lodash@4.17.21"
      }
    }
    </script>

    <style>
        body { 
            background-color: #F8FAFC; 
            margin: 0; padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useMemo, useEffect, useCallback, createContext, useContext, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
          LayoutDashboard, Link2, Building2, UploadCloud, Search, 
          CheckCircle2, AlertCircle, Filter, Menu, X, ArrowRight, 
          TableProperties, Clock, FileText, FileBadge2, FileImage, 
          Trash2, Eye, Camera, Send, Mail, UserCircle2, Pencil,
          TrendingUp, AlertTriangle, FileCheck2, ChevronRight, ChevronDown, Wand2,
          Copy, ExternalLink, Settings, DownloadCloud, Loader2, Info, History,
          Wallet, FileWarning, Timer, MessageSquare
        } from 'lucide-react';
        import { 
          BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip as RechartsTooltip, 
          ResponsiveContainer, Cell 
        } from 'recharts';

        // --- FIREBASE IMPORTS & SETUP ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let app, auth, db;
        try {
            const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (e) {
            console.error("Firebase init error", e);
        }
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // ==========================================
        // 1. UTILITÁRIOS & FORMATAÇÃO
        // ==========================================
        const cleanCnpj = (cnpj) => String(cnpj || '').replace(/\D/g, '');
        const formatCnpj = (cnpj) => cleanCnpj(cnpj).replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, "$1.$2.$3/$4-$5");
        const formatCurrency = (value) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value || 0);
        const formatCurrencyCompact = (value) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL', notation: 'compact', maximumFractionDigits: 2 }).format(value || 0);
        
        // Conversor inteligente de moeda brasileira para número
        const parseNumber = (val) => {
            if (typeof val === 'number') return val;
            if (!val) return 0;
            let v = String(val).trim();
            // Remove R$, espaços e caracteres não numéricos exceto , e .
            v = v.replace(/R\$\s?/g, '').replace(/[^\d.,-]/g, '').trim();
            // Se tiver ponto de milhar e vírgula de centavo (ex: 1.500,00)
            if (v.includes('.') && v.includes(',')) {
                v = v.replace(/\./g, '').replace(',', '.');
            } else if (v.includes(',')) {
                // Se tiver apenas vírgula (ex: 1500,00)
                v = v.replace(',', '.');
            }
            return Number(v) || 0;
        };

        const formatChave = (chave) => {
          const c = String(chave || '').replace(/\D/g, '');
          if (c.length !== 44) return chave; 
          return c.replace(/(\d{4})(?=\d)/g, '$1 ').trim();
        };
        
        const parseDate = (dateStr) => {
          if (!dateStr) return new Date();
          if (dateStr.includes('T')) return new Date(dateStr);
          const parts = dateStr.split('/');
          if (parts.length === 3) return new Date(parts[2], parts[1] - 1, parts[0]);
          return new Date();
        };
        
        const calcularDiasAtraso = (dataStr) => {
          const diffTime = new Date().getTime() - parseDate(dataStr).getTime();
          return Math.max(0, Math.floor(diffTime / (1000 * 60 * 60 * 24)));
        };

        const mapNFs = (data) => data.map((item, index) => {
          const descricaoProduto = item['Descrição'] || item['Descrição do Item'] || item['Material'] || item['Produto/Serviço'] || item['Produto'] || item['Nome do Produto'] || item['Serviço'] || item['Discriminação'] || item['Item'] || '';
          return {
            id: String(item['Chave de Acesso'] || item['Número'] || `nf-${index}`) + `_idx_${index}`,
            chaveAcesso: String(item['Chave de Acesso'] || ''),
            descricaoMaterial: String(descricaoProduto),
            cnpj: String(item['CNPJ Emitente'] || ''),
            nome: String(item['Nome PJ Emitente'] || 'Fornecedor Não Identificado'),
            data: String(item['Data Emissão'] || new Date().toLocaleDateString('pt-BR')),
            numero: String(item['Número'] || 'S/N'),
            valor: parseNumber(item['Valor Total da Nota']),
            status: 'pendente'
          };
        });

        const mapPedidos = (data) => data.map((item, index) => {
          const descricaoProduto = item['Descrição do Item'] || item['Descrição'] || item['Produto'] || item['Material'] || item['Serviço'] || item['Nome do Produto'] || item['Item'] || 'Sem descrição detalhada';
          return {
            id: String(item['Pedido'] || `ped-${index}`) + `_idx_${index}`,
            numeroPedido: String(item['Pedido'] || 'Sem Nº'),
            cnpj: String(item['Fornecedor Nº CNPJ'] || ''),
            fornecedor: String(item['Fornecedor Razão Social'] || ''),
            centroCusto: String(item['Centro de Custo de Alocação'] || 'Setor Não Identificado'),
            valor: parseNumber(item['Valor Total do Item']),
            descricao: String(descricaoProduto),
            quantidade: String(item['Quantidade do item'] || '1')
          };
        });

        // ==========================================
        // 2. HOOKS CUSTOMIZADOS
        // ==========================================
        function useLocalStorage(key, initialValue) {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) { return initialValue; }
            });
            const setValue = (value) => {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));
                } catch (error) { console.error(error); }
            };
            return [storedValue, setValue];
        }

        // Hook de Sincronização em Tempo Real com Banco de Dados na Nuvem (Firestore)
        function useFirebaseSync(docId, initialValue, user) {
            const [state, setState] = useState(initialValue);
            const [initialized, setInitialized] = useState(false);

            useEffect(() => {
                if (!user || !db) {
                    setInitialized(true);
                    return;
                }
                const docRef = doc(collection(db, 'artifacts', appId, 'public', 'data', 'app_state'), docId);
                
                const unsubscribe = onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists()) {
                        setState(docSnap.data().value);
                    } else {
                        setDoc(docRef, { value: initialValue }, { merge: true });
                        setState(initialValue);
                    }
                    setInitialized(true);
                }, (error) => {
                    console.error("Firestore sync error:", error);
                    setInitialized(true);
                });

                return () => unsubscribe();
            }, [user, docId]);

            const updateState = useCallback((newValue) => {
                const valueToStore = typeof newValue === 'function' ? newValue(state) : newValue;
                setState(valueToStore); // Atualiza visualmente na hora (Optimistic Update)
                
                if (user && db) {
                    const docRef = doc(collection(db, 'artifacts', appId, 'public', 'data', 'app_state'), docId);
                    setDoc(docRef, { value: valueToStore }, { merge: true }).catch(err => console.error("Erro ao salvar:", err));
                }
            }, [user, docId, state]);

            return [state, updateState, initialized];
        }

        // ==========================================
        // 3. CONTEXTO GLOBAL DA APLICAÇÃO
        // ==========================================
        const AppContext = createContext({});
        const useAppContext = () => useContext(AppContext);

        // ==========================================
        // 4. COMPONENTES DE UI & VIEWS
        // ==========================================

        const DashboardView = () => {
            const { kpis, topSetoresPendentes, nfsMapeadas, dadosFiscais, handleAbrirDetalhes, setActiveTab } = useAppContext();
            
            // Lógica para as faturas críticas (Top 5 mais antigas pendentes)
            const faturasCriticas = useMemo(() => {
                return nfsMapeadas
                    .filter(nf => !dadosFiscais[nf.id])
                    .sort((a, b) => b.diasAtraso - a.diasAtraso)
                    .slice(0, 5);
            }, [nfsMapeadas, dadosFiscais]);

            return (
                <div className="space-y-8 max-w-7xl mx-auto animate-fade-in pb-10">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-end gap-4 mb-6">
                        <div>
                            <h2 className="text-2xl md:text-3xl font-bold text-slate-900 tracking-tight">Dashboard Executivo</h2>
                            <p className="text-slate-500 mt-2 text-sm font-medium">Controle em tempo real de gargalos, volumes financeiros e faturas críticas.</p>
                        </div>
                        <div className="px-5 py-3 bg-white rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4">
                            <span className="text-xs font-semibold text-slate-500 uppercase tracking-wider">Progresso Global</span>
                            <div className="flex items-center gap-3">
                                <div className="w-32 bg-slate-100 rounded-full h-2.5 overflow-hidden">
                                    <div className="h-full bg-emerald-500 rounded-full" style={{ width: `${kpis.progresso}%` }}></div>
                                </div>
                                <span className="text-sm font-bold text-slate-800">{kpis.progresso}%</span>
                            </div>
                        </div>
                    </div>
                    
                    {/* Cards de Métricas Principais */}
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        
                        {/* Card 1: Total Base */}
                        <div className="bg-white rounded-3xl p-6 border border-slate-200 shadow-sm relative overflow-hidden group hover:shadow-lg transition-all duration-300 flex flex-col justify-between min-h-[170px]">
                            <div className="absolute -right-4 -top-4 text-slate-100 opacity-80 group-hover:scale-110 group-hover:rotate-3 transition-transform duration-500"><Wallet size={120} strokeWidth={1} /></div>
                            <div className="flex justify-between items-start relative z-10 mb-4">
                                <div className="flex items-center gap-3">
                                    <div className="w-11 h-11 rounded-2xl bg-blue-50 border border-blue-100 flex items-center justify-center text-blue-600 shadow-sm">
                                        <TableProperties size={22} />
                                    </div>
                                    <div>
                                        <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Volume Total</p>
                                        <p className="text-[11px] font-semibold text-slate-400">{kpis.totalNotas} faturas na base</p>
                                    </div>
                                </div>
                            </div>
                            <div className="relative z-10 mt-auto">
                                <h3 className="text-3xl lg:text-4xl font-black text-slate-800 tracking-tighter">
                                    {formatCurrencyCompact(kpis.valorTotal)}
                                </h3>
                                <p className="text-[11px] font-bold text-slate-400 mt-1">{formatCurrency(kpis.valorTotal)} exatos</p>
                            </div>
                        </div>

                        {/* Card 2: Conciliação Pendente */}
                        <div className="bg-white rounded-3xl p-6 border border-amber-200/80 shadow-sm relative overflow-hidden group hover:shadow-lg transition-all duration-300 flex flex-col justify-between min-h-[170px]">
                            <div className="absolute -right-4 -top-4 text-amber-50 opacity-80 group-hover:scale-110 group-hover:-rotate-3 transition-transform duration-500"><Wand2 size={120} strokeWidth={1} /></div>
                            <div className="flex justify-between items-start relative z-10 mb-4">
                                <div className="flex items-center gap-3">
                                    <div className="w-11 h-11 rounded-2xl bg-amber-50 border border-amber-100 flex items-center justify-center text-amber-600 shadow-sm">
                                        <Wand2 size={22} />
                                    </div>
                                    <div>
                                        <p className="text-[10px] font-bold text-amber-700/70 uppercase tracking-widest">Aguardando Setor</p>
                                        <p className="text-[11px] font-semibold text-amber-600/70">{kpis.notasParaConciliar} faturas sem dono</p>
                                    </div>
                                </div>
                            </div>
                            <div className="relative z-10 mt-auto">
                                <h3 className="text-3xl lg:text-4xl font-black text-amber-900 tracking-tighter">
                                    {formatCurrencyCompact(kpis.valorConciliar)}
                                </h3>
                                <p className="text-[11px] font-bold text-amber-700/60 mt-1">{formatCurrency(kpis.valorConciliar)} exatos</p>
                            </div>
                        </div>

                        {/* Card 3: Fiscal Pendente */}
                        <div className="bg-white rounded-3xl p-6 border border-rose-200/80 shadow-sm relative overflow-hidden group hover:shadow-lg transition-all duration-300 flex flex-col justify-between min-h-[170px]">
                            <div className="absolute -right-4 -top-4 text-rose-50 opacity-80 group-hover:scale-110 group-hover:rotate-3 transition-transform duration-500"><FileWarning size={120} strokeWidth={1} /></div>
                            <div className="flex justify-between items-start relative z-10 mb-4">
                                <div className="flex items-center gap-3">
                                    <div className="w-11 h-11 rounded-2xl bg-rose-50 border border-rose-100 flex items-center justify-center text-rose-600 shadow-sm">
                                        <FileWarning size={22} />
                                    </div>
                                    <div>
                                        <p className="text-[10px] font-bold text-rose-700/70 uppercase tracking-widest">Parado no Fiscal</p>
                                        <p className="text-[11px] font-semibold text-rose-600/70">{kpis.pendentesFiscal} faturas com dono</p>
                                    </div>
                                </div>
                            </div>
                            <div className="relative z-10 mt-auto">
                                <h3 className="text-3xl lg:text-4xl font-black text-rose-900 tracking-tighter">
                                    {formatCurrencyCompact(kpis.valorPendFiscal)}
                                </h3>
                                <p className="text-[11px] font-bold text-rose-700/60 mt-1">{formatCurrency(kpis.valorPendFiscal)} exatos</p>
                            </div>
                        </div>

                        {/* Card 4: Concluídas */}
                        <div className="bg-slate-900 rounded-3xl p-6 shadow-xl relative overflow-hidden group hover:shadow-2xl transition-all duration-300 flex flex-col justify-between min-h-[170px]">
                            <div className="absolute -right-4 -top-4 text-emerald-500 opacity-10 group-hover:scale-110 group-hover:-rotate-3 transition-transform duration-500"><CheckCircle2 size={120} strokeWidth={1} /></div>
                            <div className="flex justify-between items-start relative z-10 mb-4">
                                <div className="flex items-center gap-3">
                                    <div className="w-11 h-11 rounded-2xl bg-white/10 border border-white/5 flex items-center justify-center text-emerald-400 backdrop-blur-md shadow-sm">
                                        <CheckCircle2 size={22} />
                                    </div>
                                    <div>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Lançamentos OK</p>
                                        <p className="text-[11px] font-semibold text-slate-500">{kpis.totalConcluidas} faturas validadas</p>
                                    </div>
                                </div>
                            </div>
                            <div className="relative z-10 mt-auto">
                                <h3 className="text-3xl lg:text-4xl font-black text-white tracking-tighter">
                                    {formatCurrencyCompact(kpis.valorConcluido)}
                                </h3>
                                <p className="text-[11px] font-bold text-slate-500 mt-1">{formatCurrency(kpis.valorConcluido)} exatos</p>
                            </div>
                        </div>
                        
                    </div>

                    {/* Gráficos e Listas */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 pt-2">
                        
                        {/* Gráfico de Barras */}
                        <div className="lg:col-span-2 bg-white rounded-[24px] border border-slate-200 p-6 md:p-8 shadow-sm flex flex-col">
                            <div className="flex items-center justify-between mb-8">
                                <div>
                                    <h3 className="text-base font-bold text-slate-800 flex items-center gap-2"><TrendingUp size={18} className="text-blue-600"/> Ofensores por Centro de Custo</h3>
                                    <p className="text-xs text-slate-500 mt-1 font-medium">Top 5 setores com maior volume financeiro travado.</p>
                                </div>
                            </div>
                            <div className="flex-1 min-h-[280px] w-full">
                                <ResponsiveContainer width="100%" height="100%">
                                    <BarChart data={topSetoresPendentes} margin={{ top: 10, right: 10, left: 0, bottom: 0 }}>
                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                        <XAxis dataKey="nome" axisLine={false} tickLine={false} tick={{ fontSize: 11, fill: '#64748b', fontWeight: 600 }} dy={10} />
                                        <YAxis axisLine={false} tickLine={false} tick={{ fontSize: 11, fill: '#94a3b8', fontWeight: 500 }} tickFormatter={(val) => `R$ ${val/1000}k`} />
                                        <RechartsTooltip 
                                            cursor={{fill: '#f8fafc'}} 
                                            contentStyle={{borderRadius: '16px', border: '1px solid #e2e8f0', boxShadow: '0 10px 15px -3px rgb(0 0 0 / 0.1)'}} 
                                            formatter={(value) => [`${formatCurrency(value)}`, 'Pendente']} 
                                        />
                                        <Bar dataKey="valor" radius={[6, 6, 0, 0]} barSize={48}>
                                            {topSetoresPendentes.map((entry, index) => <Cell key={`cell-bar-${index}`} fill={index === 0 ? '#f43f5e' : '#3b82f6'} />)}
                                        </Bar>
                                    </BarChart>
                                </ResponsiveContainer>
                            </div>
                        </div>

                        {/* Faturas Críticas */}
                        <div className="bg-white rounded-[24px] border border-slate-200 p-6 md:p-8 shadow-sm flex flex-col">
                            <div className="mb-6">
                                <h3 className="text-base font-bold text-slate-800 flex items-center gap-2"><Timer size={18} className="text-rose-500"/> Faturas Críticas</h3>
                                <p className="text-xs text-slate-500 mt-1 font-medium">As 5 notas mais antigas aguardando lançamento.</p>
                            </div>
                            
                            <div className="flex-1 flex flex-col gap-4 overflow-y-auto">
                                {faturasCriticas.length === 0 ? (
                                    <div className="flex-1 flex flex-col items-center justify-center text-center p-6 border-2 border-dashed border-emerald-100 rounded-2xl bg-emerald-50/50">
                                        <CheckCircle2 size={32} className="text-emerald-400 mb-2"/>
                                        <p className="text-sm font-bold text-emerald-800">Tudo em dia!</p>
                                        <p className="text-xs text-emerald-600 font-medium">Nenhuma fatura pendente.</p>
                                    </div>
                                ) : (
                                    faturasCriticas.map((nf, idx) => (
                                        <div 
                                            key={`crit-${nf.id}`} 
                                            onClick={() => { setActiveTab('setores'); handleAbrirDetalhes(nf); }}
                                            className="group flex items-start gap-3 p-3 rounded-xl hover:bg-slate-50 border border-transparent hover:border-slate-200 transition-all cursor-pointer"
                                        >
                                            <div className="w-10 h-10 rounded-xl bg-rose-50 text-rose-600 border border-rose-100 flex flex-col items-center justify-center shrink-0">
                                                <span className="text-xs font-black leading-none">{nf.diasAtraso}</span>
                                                <span className="text-[8px] font-bold uppercase mt-0.5">Dias</span>
                                            </div>
                                            <div className="min-w-0 flex-1">
                                                <div className="flex justify-between items-start mb-0.5">
                                                    <p className="text-xs font-bold text-slate-800 truncate pr-2">{nf.nome}</p>
                                                    <p className="text-xs font-bold text-slate-900 shrink-0">{formatCurrency(nf.valor)}</p>
                                                </div>
                                                <p className="text-[10px] text-slate-500 truncate">NF {nf.numero} • {nf.centroCusto}</p>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                        
                    </div>
                </div>
            );
        };

        const SetoresView = () => {
            const { 
                setores, filtroSetor, setFiltroSetor, nfsMapeadas, dadosFiscais, 
                emailsSetores, setEmailsSetores, handleAbrirDetalhes, setModalFiscalOpen,
                emailCobrancaCC, historicoCobranca, setHistoricoCobranca, addToast
            } = useAppContext();

            const [emailPreview, setEmailPreview] = useState(null);
            const [collapsedSectors, setCollapsedSectors] = useState({});

            const formatarData = (isoString) => {
                if (!isoString) return '';
                const date = new Date(isoString);
                return date.toLocaleDateString('pt-BR') + ' às ' + date.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            };

            return (
                <div className="space-y-8 max-w-7xl mx-auto animate-fade-in pb-10">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-end gap-6 mb-8">
                        <div>
                            <h2 className="text-2xl md:text-3xl font-bold text-slate-900 tracking-tight">Análise & Cobrança Setorial</h2>

                            <select value={filtroSetor} onChange={(e) => setFiltroSetor(e.target.value)} className="bg-transparent border-none w-full md:w-auto pr-6 py-1 text-slate-700 font-semibold text-sm focus:outline-none cursor-pointer">
                                <option value="Todos">Todos os Centros de Custo</option>

                            </select>

                    </div>

                    <div className="space-y-8">
                        {setores.filter(s => filtroSetor === 'Todos' || s === filtroSetor).map((setor, idx) => {

                            const nfsAtrasadas = nfsDoSetor.filter(nf => !dadosFiscais[nf.id]);
                            const progressoSetor = nfsDoSetor.length > 0 ? Math.round(((nfsDoSetor.length - nfsAtrasadas.length) / nfsDoSetor.length) * 100) : 0;
                            const emailSetor = emailsSetores[setor] || "";
                            const ultimaCobranca = historicoCobranca[setor];
                            
                            const isCobrado = !!ultimaCobranca && nfsAtrasadas.length > 0;
                            const cardWrapperClasses = isCobrado 
                                ? "bg-indigo-50/40 border-indigo-200" 
                                : "bg-white border-slate-200";

                            const isCollapsed = collapsedSectors[setor];

                            return (
                                <div key={`setor-card-${idx}`} className={`${cardWrapperClasses} rounded-3xl p-6 md:p-8 border shadow-sm relative overflow-hidden transition-colors duration-500`}>

                                        <Building2 size={120} />
                                    </div>
                                    
                                    <div className={`flex flex-col lg:flex-row justify-between items-start lg:items-center gap-6 relative z-10 ${isCollapsed ? '' : 'mb-8'}`}>
                                        <div className="flex-1 w-full">
                                            <div className="flex items-center gap-3 mb-3">
                                                <div 
                                                    className="flex items-center gap-2 cursor-pointer group"
                                                    onClick={() => setCollapsedSectors(prev => ({...prev, [setor]: !prev[setor]}))}
                                                    title={isCollapsed ? "Expandir setor" : "Recolher setor"}

                                                    <button className={`p-1.5 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-500 transition-all duration-300 ${isCollapsed ? '-rotate-90' : 'rotate-0'}`}>
                                                        <ChevronDown size={20} />
                                                    </button>
                                                    <h3 className={`font-bold text-xl lg:text-2xl tracking-tight ${isCobrado ? 'text-indigo-900' : 'text-slate-800'} group-hover:text-blue-600 transition-colors`}>{setor}</h3>
                                                </div>
                                                {ultimaCobranca && (
                                                    <span className="flex items-center gap-1.5 text-[10px] font-bold text-indigo-700 bg-indigo-100 border border-indigo-200 px-2.5 py-1 rounded-full whitespace-nowrap shadow-sm">

                                                    </span>

                                            </div>
                                            <div className="flex items-center gap-4 w-full max-w-sm">
                                                <div className={`w-full rounded-full h-2 overflow-hidden border ${isCobrado ? 'bg-indigo-100 border-indigo-200' : 'bg-slate-100 border-slate-200/60'}`}>
                                                    <div className={`h-full rounded-full transition-all duration-1000 ${progressoSetor === 100 ? 'bg-emerald-500' : 'bg-gradient-to-r from-blue-500 to-indigo-600'}`} style={{ width: `${progressoSetor}%` }}></div>
                                                </div>
                                                <span className={`text-xs font-bold whitespace-nowrap ${isCobrado ? 'text-indigo-600' : 'text-slate-500'}`}>{progressoSetor}% Concluído</span>

                                        <div className={`flex flex-col sm:flex-row items-stretch sm:items-center gap-3 w-full lg:w-auto p-2.5 rounded-2xl border ${isCobrado ? 'bg-white/60 border-indigo-100' : 'bg-slate-50 border-slate-200'}`}>

                                            </div>
                                            <button 
                                                onClick={() => { 
                                                    if(!emailSetor || nfsAtrasadas.length === 0) return; 
                                                    setEmailPreview({ setor, email: emailSetor, nfs: nfsAtrasadas });
                                                }} 
                                                className={`flex justify-center items-center gap-2 px-6 py-2.5 rounded-xl text-sm font-semibold transition-all shadow-sm shrink-0 ${!emailSetor || nfsAtrasadas.length === 0 ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : isCobrado ? 'bg-indigo-100 hover:bg-indigo-200 text-indigo-700 border border-indigo-200' : 'bg-slate-900 hover:bg-slate-800 text-white'}`}
                                            >
                                                <Send size={16} /> {isCobrado ? 'Reenviar Cobrança' : 'Enviar Cobrança'}
                                            </button>
                                        </div>
                                    </div>

                                    {!isCollapsed && (
                                        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5 relative z-10 animate-fade-in">
                                            {nfsDoSetor.map((nf, nIdx) => {
                                                const statusFiscal = dadosFiscais[nf.id];
                                                const isOrphan = !nf.pedido;
                                            const cardClasses = statusFiscal 
                                                ? 'border-emerald-200 bg-emerald-50/30' 
                                                : isOrphan 
                                                    ? 'border-amber-300 bg-amber-50/40 hover:border-amber-400' 
                                                    : 'border-slate-200 bg-slate-50 hover:border-blue-300';

                                            // Pegar a última observação para exibir no preview do card
                                            const ultimaObs = nf.observacoes && nf.observacoes.length > 0 ? nf.observacoes[nf.observacoes.length - 1] : null;

                                            return (
                                                <div key={`nf-card-${nf.id}-${nIdx}`} className={`rounded-2xl border transition-all duration-300 flex flex-col justify-between overflow-hidden group hover:shadow-md ${cardClasses}`}>
                                                    <div onClick={() => handleAbrirDetalhes(nf)} className="p-5 cursor-pointer relative h-full flex flex-col">
                                                        <div className="flex justify-between items-start mb-4">
                                                            <div className="min-w-0 pr-3 flex-1">
                                                                <div className="flex items-center gap-2 mb-2">
                                                                    <span className="text-[10px] font-bold text-slate-500 uppercase tracking-wider bg-white border border-slate-200 px-2 py-1 rounded-md shadow-sm">NF {nf.numero}</span>
                                                                    {isOrphan && !statusFiscal && <span className="text-[9px] font-bold text-amber-700 bg-amber-100 px-2 py-1 rounded-md uppercase tracking-wider border border-amber-200 shadow-sm">Sem Pedido</span>}
                                                                </div>
                                                                <p className="text-sm font-bold text-slate-800 line-clamp-1">{nf.nome}</p>
                                                                {nf.chaveAcesso && (
                                                                    <p className="text-[9px] text-slate-400 font-mono mt-1 truncate" title={nf.chaveAcesso}>Chave: {nf.chaveAcesso}</p>
                                                                )}
                                                            </div>
                                                            <div className="flex flex-col items-end shrink-0 gap-1.5 ml-2">
                                                                <span className="text-base font-black text-slate-900 tracking-tight">{formatCurrency(nf.valor)}</span>
                                                                {!statusFiscal && <span className="text-[10px] font-bold px-2 py-1 rounded border bg-white text-slate-600 border-slate-200 uppercase tracking-wider flex items-center gap-1"><Clock size={10}/> {nf.diasAtraso}d</span>}
                                                            </div>
                                                        </div>
                                                        <div className="mt-auto pt-3 border-t border-slate-200/60 border-dashed">
                                                            {nf.pedido ? (
                                                                <div className="space-y-2">
                                                                    <div className="flex items-center gap-2 text-xs text-slate-500 font-semibold"><TableProperties size={14} className="text-blue-500"/> Ped. {nf.pedido.numeroPedido}</div>
                                                                    <p className="text-xs text-slate-600 line-clamp-2 leading-relaxed bg-white p-2.5 rounded-lg border border-slate-100 shadow-sm" title={nf.pedido.descricao}>{nf.pedido.descricao}</p>
                                                                </div>
                                                            ) : (
                                                                <div className="space-y-2">
                                                                    <div className="flex items-center gap-2 text-xs text-amber-700 font-semibold"><AlertTriangle size={14} className="text-amber-500"/> Fatura atribuída manualmente</div>
                                                                    {(nf.descricaoManual || nf.descricaoMaterial) && (
                                                                        <p className="text-xs text-slate-600 line-clamp-2 leading-relaxed bg-white p-2.5 rounded-lg border border-slate-100 shadow-sm" title={nf.descricaoManual || nf.descricaoMaterial}>{nf.descricaoManual || nf.descricaoMaterial}</p>
                                                                    )}
                                                                </div>
                                                            )}
                                                            
                                                            {ultimaObs && (
                                                                <div className="mt-3 p-2.5 bg-blue-50 border border-blue-100 rounded-lg flex flex-col gap-1">
                                                                    <div className="flex items-center gap-1.5">
                                                                        <UserCircle2 size={12} className="text-blue-500 shrink-0" />
                                                                        <span className="text-[9px] font-bold text-blue-700 uppercase tracking-wider">{ultimaObs.user}</span>
                                                                    </div>
                                                                    <p className="text-[11px] text-blue-800 font-medium italic line-clamp-2 pl-4" title={ultimaObs.text}>{ultimaObs.text}</p>
                                                                </div>
                                                            )}
                                                        </div>
                                                    </div>
                                                    <div className={`p-4 border-t flex items-center justify-between ${statusFiscal ? 'bg-white border-emerald-100' : isOrphan ? 'bg-amber-100/50 border-amber-200/60' : 'bg-white border-slate-200/60'}`}>
                                                        {statusFiscal ? (
                                                            <div className="flex items-center justify-between w-full">
                                                                <div className="flex items-center gap-1.5"><CheckCircle2 size={16} className="text-emerald-500"/><p className="text-xs font-bold text-slate-700">Lançado no Fiscal</p></div>
                                                                {statusFiscal.fileUrl && <a href={statusFiscal.fileUrl} target="_blank" rel="noreferrer" className="text-[11px] font-bold text-blue-600 hover:text-blue-800 transition-colors uppercase tracking-wider">Ver Print</a>}
                                                            </div>
                                                        ) : (
                                                            <button onClick={(e) => { e.stopPropagation(); setModalFiscalOpen(nf.id); }} className={`w-full flex items-center justify-center gap-2 py-1.5 text-sm font-semibold transition-all ${isOrphan ? 'text-amber-900 group-hover:text-amber-700' : 'text-slate-600 group-hover:text-blue-700'}`}>
                                                                Registrar Lançamento <ChevronRight size={16}/>
                                                            </button>
                                                        )}
                                                    </div>
                                                </div>
                                            )
                                        })}
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>

                    {/* MODAL DE PREVIEW DO E-MAIL */}
                    {emailPreview && (() => {
                        const assunto = `Ação Necessária: Lançamento Fiscal Pendente (${emailPreview.setor})`;
                        
                        let bodyTextoPlano = `Olá equipe do setor ${emailPreview.setor},\n\n`;
                        bodyTextoPlano += `Identificamos ${emailPreview.nfs.length} nota(s) fiscal(is) aguardando a sua validação e lançamento para fiscal.\n\n`;
                        bodyTextoPlano += `=== DETALHES DAS NOTAS ===\n`;
                        
                        emailPreview.nfs.forEach(nf => {
                            const desc = nf.pedido?.descricao || nf.descricaoManual || nf.descricaoMaterial || 'Não informada';
                            bodyTextoPlano += `\nNF: ${nf.numero} | Valor: ${formatCurrency(nf.valor)}\n`;
                            bodyTextoPlano += `Fornecedor: ${nf.nome}\n`;
                            bodyTextoPlano += `Descrição: ${desc}\n`;
                            bodyTextoPlano += `Chave: ${nf.chaveAcesso || 'Não informada'}\n`;
                            bodyTextoPlano += `--------------------------------------------------\n`;
                        });
                        
                        bodyTextoPlano += `\n📌 INSTRUÇÕES IMPORTANTES:\n`;
                        bodyTextoPlano += `- No importador, vocês podem utilizar tanto o Número da Nota quanto a Chave de Acesso.\n`;
                        bodyTextoPlano += `- Caso alguma nota acima NÃO seja do seu setor, por favor, responda este e-mail imediatamente para corrigirmos.\n`;
                        bodyTextoPlano += `- Após o lançamento, acesse o painel e anexe o comprovante (print do e-mail) OBRIGATORIAMENTE para prosseguirmos.\n\n`;
                        bodyTextoPlano += `Atenciosamente,\nEquipe Financeira`;

                        let mailtoHref = `mailto:${emailPreview.email}?subject=${encodeURIComponent(assunto)}&body=${encodeURIComponent(bodyTextoPlano)}`;
                        if (emailCobrancaCC) {
                            mailtoHref = `mailto:${emailPreview.email}?cc=${emailCobrancaCC}&subject=${encodeURIComponent(assunto)}&body=${encodeURIComponent(bodyTextoPlano)}`;
                        }

                        const handleEnviarClick = () => {
                            setHistoricoCobranca(prev => ({ ...prev, [emailPreview.setor]: new Date().toISOString() }));
                            setEmailPreview(null);
                        };

                        return (
                            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[200] flex items-center justify-center p-4 animate-fade-in">
                                <div className="bg-white rounded-[24px] w-full max-w-3xl shadow-2xl overflow-hidden flex flex-col transform transition-all animate-slide-up max-h-[90vh]">
                                    <div className="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50 shrink-0">
                                        <h2 className="text-lg font-bold text-slate-800 flex items-center gap-2"><Mail size={20} className="text-blue-600"/> Pré-visualização do E-mail</h2>
                                        <button onClick={() => setEmailPreview(null)} className="p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-200 rounded-xl transition-colors"><X size={20} /></button>
                                    </div>
                                    <div className="p-6 overflow-y-auto flex-1">
                                        <div className="grid grid-cols-[80px_1fr] gap-3 text-sm mb-6 bg-slate-50 p-4 rounded-xl border border-slate-200">
                                            <span className="font-bold text-slate-500 text-right mt-0.5">Para:</span>
                                            <span className="font-medium text-slate-900 bg-white px-3 py-1 border border-slate-200 rounded-lg">{emailPreview.email}</span>
                                            
                                            {emailCobrancaCC && (
                                                <>
                                                    <span className="font-bold text-slate-500 text-right mt-0.5">CC:</span>
                                                    <span className="font-medium text-slate-900 bg-white px-3 py-1 border border-slate-200 rounded-lg">{emailCobrancaCC}</span>
                                                </>
                                            )}

                                            <span className="font-bold text-slate-500 text-right mt-0.5">Assunto:</span>
                                            <span className="font-bold text-slate-900 mt-0.5">{assunto}</span>
                                        </div>
                                        
                                        <div className="p-6 bg-white rounded-xl border border-slate-200 text-sm text-slate-700 leading-relaxed shadow-inner">
                                            <p className="mb-4 text-base">Olá equipe do setor <strong className="text-slate-900">{emailPreview.setor}</strong>,</p>
                                            <p className="mb-6">Identificamos <strong>{emailPreview.nfs.length} nota(s) fiscal(is)</strong> aguardando a sua validação e lançamento para fiscal.</p>
                                            
                                            <div className="space-y-4 mb-6">
                                                {emailPreview.nfs.map(nf => {
                                                    const desc = nf.pedido?.descricao || nf.descricaoManual || nf.descricaoMaterial || 'Não informada';
                                                    return (
                                                        <div key={`prev-${nf.id}`} className="bg-slate-50 border border-slate-200 p-4 rounded-lg relative overflow-hidden">
                                                            <div className="absolute left-0 top-0 bottom-0 w-1 bg-blue-500"></div>
                                                            <div className="flex justify-between items-start mb-2">
                                                                <h4 className="font-bold text-slate-900 text-base">NF: {nf.numero}</h4>
                                                                <span className="font-black text-blue-700 text-base">{formatCurrency(nf.valor)}</span>
                                                            </div>
                                                            <p className="mb-1"><strong className="text-slate-600">Fornecedor:</strong> {nf.nome}</p>
                                                            <p className="mb-1"><strong className="text-slate-600">Descrição:</strong> {desc}</p>
                                                            <p className="font-mono text-xs text-slate-500 mt-2 bg-white border border-slate-100 p-2 rounded"><strong className="font-sans text-slate-600">Chave:</strong> {nf.chaveAcesso || 'Não informada'}</p>
                                                        </div>
                                                    )
                                                })}
                                            </div>

                                            <div className="bg-amber-50 border border-amber-200 p-5 rounded-xl mb-6">
                                                <h4 className="font-bold text-amber-900 mb-2 flex items-center gap-2"><AlertTriangle size={16}/> INSTRUÇÕES IMPORTANTES:</h4>
                                                <ul className="list-disc pl-5 space-y-2 text-amber-800 font-medium">
                                                    <li>No importador, vocês podem utilizar tanto o Número da Nota quanto a Chave de Acesso.</li>
                                                    <li>Caso alguma nota acima <strong>NÃO seja do seu setor</strong>, por favor, responda este e-mail imediatamente para corrigirmos.</li>
                                                    <li>Após o lançamento, acesse o painel e anexe o comprovante (print do e-mail) <strong>OBRIGATORIAMENTE</strong> para prosseguirmos.</li>
                                                </ul>
                                            </div>
                                            
                                            <p>Atenciosamente,<br/><strong className="text-slate-900">Equipe Financeira</strong></p>
                                        </div>
                                    </div>
                                    <div className="p-5 border-t border-slate-100 bg-white flex flex-col sm:flex-row justify-end gap-3 shrink-0">
                                        <button onClick={() => setEmailPreview(null)} className="px-5 py-2.5 text-sm font-semibold text-slate-600 hover:bg-slate-100 rounded-xl transition-colors">Cancelar</button>
                                        
                                        <button 
                                            onClick={() => {
                                                navigator.clipboard.writeText(bodyTextoPlano)
                                                    .then(() => {
                                                        addToast('Texto copiado! Agora é só colar no Gmail.', 'success');
                                                        handleEnviarClick();
                                                    })
                                                    .catch(() => addToast('Erro ao copiar texto.', 'error'));
                                            }} 
                                            className="px-6 py-2.5 bg-slate-100 text-slate-700 border border-slate-300 text-sm font-semibold rounded-xl hover:bg-slate-200 transition-all shadow-sm flex items-center justify-center gap-2"
                                        >
                                            <Copy size={16} /> Copiar Texto
                                        </button>

                                        <a href={mailtoHref} onClick={handleEnviarClick} className="px-6 py-2.5 bg-blue-600 text-white text-sm font-semibold rounded-xl hover:bg-blue-700 transition-all shadow-sm flex items-center justify-center gap-2">
                                            Abrir E-mail Automático <ArrowRight size={16} />
                                        </a>
                                    </div>
                                </div>
                            </div>
                        );
                    })()}
                </div>
            );
        };

        const ConciliacaoView = () => {
            const { nfsMapeadas, setoresManuais, setSetoresManuais, pedidos, handleVincularManual, setoresDisponiveis, addToast } = useAppContext();
            const nfsSemPedido = nfsMapeadas.filter(nf => !nf.pedido && !setoresManuais[nf.id]);
            
            return (
                <div className="space-y-8 max-w-7xl mx-auto animate-fade-in pb-10">
                    <div className="mb-8">
                        <h2 className="text-2xl md:text-3xl font-bold text-slate-900 tracking-tight">Conciliação Inteligente</h2>
                        <p className="text-slate-500 mt-2 text-sm font-medium">Encontramos {nfsSemPedido.length} notas sem pedido de origem ou setor vinculado. Revise as sugestões automáticas abaixo.</p>
                    </div>
                    
                    <div className="space-y-6">
                        {nfsSemPedido.length === 0 ? (
                            <div className="bg-emerald-50 border border-emerald-200 rounded-3xl p-10 text-center flex flex-col items-center">
                                <CheckCircle2 size={48} className="text-emerald-500 mb-4" />
                                <h3 className="text-xl font-bold text-slate-800">Tudo Conciliado!</h3>
                                <p className="text-slate-500 mt-2">Todas as faturas ativas já possuem um vínculo de pedido ou setor manual.</p>
                            </div>
                        ) : nfsSemPedido.map((nf) => {
                            const rootCnpj = cleanCnpj(nf.cnpj).substring(0, 8);
                            const primeiroNome = nf.nome.split(' ')[0].toLowerCase();
                            
                            const sugestoes = pedidos.filter(p => {
                                const pCnpj = cleanCnpj(p.cnpj);
                                return (pCnpj && pCnpj.startsWith(rootCnpj)) || (p.fornecedor && p.fornecedor.toLowerCase().includes(primeiroNome));
                            }).slice(0, 3);

                            const ultimaObs = nf.observacoes && nf.observacoes.length > 0 ? nf.observacoes[nf.observacoes.length - 1] : null;

                            return (
                                <div key={`concil-${nf.id}`} className="bg-white rounded-3xl p-6 border border-slate-200 shadow-sm flex flex-col xl:flex-row gap-6 items-start hover:shadow-md transition-shadow">
                                    <div className="xl:w-1/3 w-full shrink-0">
                                        <div className="flex items-center gap-2 mb-3">
                                            <span className="text-[10px] font-bold text-slate-500 uppercase tracking-wider bg-slate-100 px-2.5 py-1 rounded-md">NF {nf.numero}</span>
                                            <span className="text-[10px] font-bold text-amber-700 bg-amber-50 border border-amber-200 px-2.5 py-1 rounded-md flex items-center gap-1"><AlertTriangle size={12}/> Fatura Órfã</span>
                                        </div>
                                        <h4 className="text-base font-bold text-slate-800 leading-tight mb-1">{nf.nome}</h4>
                                        <p className="text-xs text-slate-500 font-medium">CNPJ: {formatCnpj(nf.cnpj)}</p>
                                        <p className="text-2xl font-black text-slate-900 tracking-tight mt-2">{formatCurrency(nf.valor)}</p>
                                        {(nf.descricaoManual || nf.descricaoMaterial) && (
                                            <div className="mt-4 p-3 bg-slate-50 rounded-xl border border-slate-100">
                                                <p className="text-[10px] font-bold text-slate-500 uppercase mb-1">Descrição na Nota:</p>
                                                <p className="text-xs font-medium text-slate-700">{nf.descricaoManual || nf.descricaoMaterial}</p>
                                            </div>
                                        )}
                                        {ultimaObs && (
                                            <div className="mt-3 p-3 bg-blue-50 rounded-xl border border-blue-100 flex flex-col gap-1">
                                                <div className="flex items-center gap-1.5">
                                                    <UserCircle2 size={12} className="text-blue-500 shrink-0" />
                                                    <span className="text-[9px] font-bold text-blue-700 uppercase tracking-wider">{ultimaObs.user}</span>
                                                </div>
                                                <p className="text-xs text-blue-800 font-medium italic pl-4">{ultimaObs.text}</p>
                                            </div>
                                        )}
                                    </div>
                                    
                                    <div className="flex-1 w-full bg-slate-50 p-5 rounded-2xl border border-slate-100 flex flex-col">
                                        <p className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4 flex items-center gap-2"><Wand2 size={14} className="text-indigo-500"/> Sugestões de Pedidos</p>
                                        
                                        {sugestoes.length > 0 ? (
                                            <div className="space-y-3 flex-1">
                                                {sugestoes.map(ped => (
                                                    <div key={`sug-${ped.id}`} className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 p-4 bg-white border border-slate-200 rounded-xl shadow-sm hover:border-indigo-300 transition-colors">
                                                        <div>
                                                            <div className="flex items-center gap-2 mb-1">
                                                                <p className="text-sm font-bold text-slate-800">Pedido {ped.numeroPedido}</p>
                                                                <span className="text-[10px] font-semibold text-indigo-700 bg-indigo-50 px-2 py-0.5 rounded-full">{ped.centroCusto}</span>
                                                            </div>
                                                            <p className="text-xs text-slate-500 line-clamp-1">{ped.fornecedor} • {formatCurrency(ped.valor)}</p>
                                                        </div>
                                                        <button onClick={() => { handleVincularManual(nf.id, ped.id); addToast('Vínculo criado!', 'success'); }} className="shrink-0 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-semibold px-4 py-2 rounded-lg flex items-center justify-center gap-2 transition-colors">
                                                            <Link2 size={14}/> Vincular
                                                        </button>
                                                    </div>
                                                ))}
                                            </div>
                                        ) : (
                                            <div className="text-center py-6 px-4 flex-1 flex flex-col items-center justify-center">
                                                <Search size={32} className="text-slate-300 mb-3" />
                                                <p className="text-sm font-medium text-slate-500">Nenhuma correspondência óbvia encontrada pelo CNPJ ou Nome.</p>
                                            </div>
                                        )}
                                        
                                        <div className="mt-4 p-4 bg-blue-50 border border-blue-100 rounded-xl flex flex-col sm:flex-row gap-3 items-start sm:items-center justify-between">
                                            <div>
                                                <p className="text-sm font-bold text-blue-900">Não encontrou o pedido de origem?</p>
                                                <p className="text-xs text-blue-700 mt-0.5">Encaminhe diretamente para o centro de custo responsável.</p>
                                            </div>
                                            <select 
                                                className="w-full sm:w-auto p-2 rounded-lg text-sm border-blue-200 shadow-sm font-medium text-slate-700 focus:ring-2 focus:ring-blue-500 outline-none cursor-pointer"
                                                onChange={(e) => { 
                                                    if(e.target.value) { 
                                                        setSetoresManuais(prev => ({ ...prev, [nf.id]: e.target.value })); 
                                                        addToast(`Nota enviada para ${e.target.value}`, 'success');
                                                    } 
                                                }}
                                            >
                                                <option value="">Selecione um Setor...</option>
                                                {setoresDisponiveis.map(s => <option key={`opt-concil-${s}`} value={s}>{s}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        // ==========================================
        // 5. MODAIS & TOASTS
        // ==========================================
        
        const ToastManager = () => {
            const { toasts, removeToast } = useAppContext();
            return (
                <div className="fixed bottom-6 right-6 z-[999] flex flex-col gap-3 pointer-events-none">
                    {toasts.map(toast => (
                        <div key={toast.id} className={`pointer-events-auto flex items-center gap-3 px-4 py-3 rounded-xl shadow-xl border animate-toast-in ${toast.type === 'success' ? 'bg-emerald-50 border-emerald-200 text-emerald-800' : toast.type === 'error' ? 'bg-rose-50 border-rose-200 text-rose-800' : 'bg-white border-slate-200 text-slate-800'}`}>
                            {toast.type === 'success' ? <CheckCircle2 size={20} className="text-emerald-500"/> : toast.type === 'error' ? <AlertCircle size={20} className="text-rose-500"/> : <Info size={20} className="text-blue-500"/>}
                            <p className="text-sm font-semibold">{toast.message}</p>
                            <button onClick={() => removeToast(toast.id)} className="ml-2 text-slate-400 hover:text-slate-600"><X size={16}/></button>
                        </div>
                    ))}
                </div>
            );
        }

        const ModalDetalhesNF = () => {
            const { 
                nfSelecionada, setNfSelecionada, setoresManuais, setSetoresManuais, 
                pedidos, handleVincularManual, isEditingNfInfo, setIsEditingNfInfo, editSetor, setEditSetor, 
                setoresDisponiveis, searchPedidoStr, setSearchPedidoStr, addToast, dadosFiscais, setModalFiscalOpen,
                observacoesNf, setObservacoesNf, descricoesManuais, setDescricoesManuais,
                usuarioAtual // Novo context do usuário
            } = useAppContext();

            const [tempDesc, setTempDesc] = useState('');
            const [novoComentario, setNovoComentario] = useState('');
            const endOfChatRef = useRef(null);

            useEffect(() => {
                if (nfSelecionada) {
                    setTempDesc(nfSelecionada.descricaoManual || '');
                    // Scroll to bottom of chat when opened
                    setTimeout(() => {
                        endOfChatRef.current?.scrollIntoView({ behavior: 'smooth' });
                    }, 100);
                }
            }, [nfSelecionada]);

            if (!nfSelecionada) return null;
            const pedContext = nfSelecionada.pedido;
            
            // Garantir que as observações sejam um array para o Chat
            const comentarios = Array.isArray(nfSelecionada.observacoes) ? nfSelecionada.observacoes : [];

            const handleAddComentario = () => {
                if (!novoComentario.trim()) return;
                
                const newComment = { 
                    id: Date.now(), 
                    user: usuarioAtual || 'Analista', 
                    text: novoComentario.trim(), 
                    date: new Date().toISOString() 
                };
                
                setObservacoesNf(prev => {
                    const currentComments = Array.isArray(prev[nfSelecionada.id]) ? prev[nfSelecionada.id] : [];
                    return { ...prev, [nfSelecionada.id]: [...currentComments, newComment] };
                });
                
                // Atualizar o state local da nfSelecionada para refletir na interface na hora
                setNfSelecionada(prev => ({
                    ...prev,
                    observacoes: [...(Array.isArray(prev.observacoes) ? prev.observacoes : []), newComment]
                }));
                
                setNovoComentario('');
                setTimeout(() => {
                    endOfChatRef.current?.scrollIntoView({ behavior: 'smooth' });
                }, 100);
            };

            return (
                <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] flex items-center justify-center p-4 animate-fade-in">
                    <div className="bg-white rounded-[24px] w-full max-w-4xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh] animate-slide-up border border-slate-200/50">
                        {/* Header */}
                        <div className="p-6 md:p-8 border-b border-slate-100 flex justify-between items-start bg-white shrink-0">
                            <div>
                                <div className="flex flex-wrap items-center gap-3 mb-3">
                                    <span className="text-xs font-bold px-3 py-1.5 bg-slate-100 text-slate-700 rounded-lg tracking-wide border border-slate-200/60">Nota Fiscal Nº {nfSelecionada.numero}</span>
                                    <span className={`text-xs font-bold px-3 py-1.5 rounded-lg tracking-wide flex items-center gap-1.5 ${nfSelecionada.diasAtraso > 15 ? 'bg-rose-50 text-rose-700 border border-rose-200' : 'bg-amber-50 text-amber-700 border border-amber-200'}`}>
                                        <Clock size={14}/> Aguardando há {nfSelecionada.diasAtraso} dias
                                    </span>
                                </div>
                                <h2 className="text-2xl md:text-3xl font-bold text-slate-900 tracking-tight">{nfSelecionada.nome}</h2>
                                <div className="mt-3 space-y-1.5">
                                    <p className="text-sm text-slate-600 font-medium flex items-center gap-2"><Building2 size={14} className="text-slate-400"/> CNPJ: {formatCnpj(nfSelecionada.cnpj)}</p>
                                    {nfSelecionada.chaveAcesso && (
                                        <p className="text-xs text-slate-500 font-mono flex items-center gap-2">
                                            <span className="font-semibold text-slate-600 font-sans">Chave de Acesso:</span> {formatChave(nfSelecionada.chaveAcesso)}
                                            <button onClick={() => {
                                                navigator.clipboard.writeText(cleanCnpj(nfSelecionada.chaveAcesso));
                                                addToast('Chave copiada para a área de transferência', 'success');
                                            }} className="p-1 hover:bg-slate-100 rounded text-slate-400 hover:text-blue-600 transition-colors"><Copy size={14}/></button>
                                        </p>
                                    )}
                                </div>
                            </div>
                            <button onClick={() => setNfSelecionada(null)} className="p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-400 hover:text-slate-700 hover:bg-slate-100 transition-colors"><X size={20} /></button>
                        </div>

                        {/* Body */}
                        <div className="p-6 md:p-8 overflow-y-auto flex-1 space-y-8 bg-slate-50/50">
                            {/* Referência Origem */}
                            <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                                <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 mb-5 pb-5 border-b border-slate-100">
                                    <h3 className="text-sm font-bold text-slate-800 flex items-center gap-2 uppercase tracking-wide">
                                        <Building2 size={18} className="text-blue-600" /> Referência Origem (Pedido)
                                    </h3>
                                    <button onClick={() => setIsEditingNfInfo(!isEditingNfInfo)} className={`flex items-center justify-center gap-2 px-4 py-2 rounded-xl text-xs font-semibold transition-colors ${isEditingNfInfo ? 'bg-slate-100 text-slate-600' : 'bg-blue-50 hover:bg-blue-100 text-blue-700'}`}>
                                        {isEditingNfInfo ? <><X size={14} /> Cancelar Ajuste</> : <><Pencil size={14} /> Ajustar Vínculo / Setor</>}
                                    </button>
                                </div>

                                {isEditingNfInfo ? (
                                    <div className="space-y-6 animate-fade-in">
                                        <div className="bg-slate-50 p-5 rounded-xl border border-slate-200">
                                            <label className="text-xs font-bold text-slate-500 uppercase tracking-wide mb-3 block">Opção A: Forçar Centro de Custo</label>
                                            <div className="flex flex-col md:flex-row gap-3">
                                                <select value={editSetor} onChange={e => setEditSetor(e.target.value)} className="flex-1 p-3 bg-white border border-slate-300 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none font-medium text-slate-700 shadow-sm">
                                                    <option value="">-- Herdar Centro de Custo do Pedido --</option>
                                                    {setoresDisponiveis.map((s, idx) => <option key={`opt-${idx}`} value={s}>{s}</option>)}
                                                </select>
                                                <button onClick={() => {
                                                    setSetoresManuais(prev => { const next = { ...prev }; if (editSetor) next[nfSelecionada.id] = editSetor; else delete next[nfSelecionada.id]; return next; });
                                                    setIsEditingNfInfo(false);
                                                    addToast('Setor atualizado com sucesso!', 'success');
                                                }} className="bg-slate-900 hover:bg-slate-800 text-white px-5 py-3 rounded-xl text-sm font-semibold transition-colors shadow-sm whitespace-nowrap">
                                                    Salvar Setor
                                                </button>
                                            </div>
                                        </div>

                                        <div className="bg-slate-50 p-5 rounded-xl border border-slate-200">
                                            <label className="text-xs font-bold text-slate-500 uppercase tracking-wide mb-3 block">Opção B: Vincular Número do Pedido</label>
                                            <div className="relative">
                                                <Search className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400" size={18}/>
                                                <input type="text" placeholder="Buscar por fornecedor ou número do pedido..." value={searchPedidoStr} onChange={e => setSearchPedidoStr(e.target.value)} className="w-full pl-10 p-3 bg-white border border-slate-300 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none font-medium shadow-sm"/>
                                            </div>
                                            {searchPedidoStr.length > 1 && (
                                                <div className="mt-3 max-h-48 overflow-y-auto border border-slate-200 rounded-xl bg-white shadow-md divide-y divide-slate-100">
                                                    {pedidos.filter(p => p.numeroPedido.includes(searchPedidoStr) || p.fornecedor.toLowerCase().includes(searchPedidoStr.toLowerCase())).map((p, idx) => (
                                                        <div key={`src-ped-${p.id}-${idx}`} className="flex flex-col sm:flex-row justify-between sm:items-center p-3 gap-3 hover:bg-slate-50 transition-colors">
                                                            <div>
                                                                <p className="text-sm font-bold text-slate-800">Pedido {p.numeroPedido}</p>
                                                                <p className="text-xs text-slate-500 truncate max-w-xs">{p.fornecedor}</p>
                                                            </div>
                                                            <button onClick={() => { handleVincularManual(nfSelecionada.id, p.id); setIsEditingNfInfo(false); addToast('Vínculo criado!', 'success'); }} className="bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-semibold px-4 py-2 rounded-lg flex items-center justify-center gap-1.5 transition-colors shadow-sm"><Link2 size={14}/> Aplicar Vínculo</button>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                ) : pedContext ? (
                                    <div className="grid grid-cols-1 lg:grid-cols-4 gap-6 relative">
                                        <div className="lg:col-span-2">
                                            <p className="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-2">Descrição do Material</p>
                                            <p className="text-sm font-medium text-slate-800 leading-relaxed bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-inner">{pedContext.descricao}</p>
                                            <div className="flex flex-wrap items-center gap-2 mt-4">
                                                <span className="text-xs bg-slate-100 border border-slate-200 px-2.5 py-1.5 rounded-lg font-semibold text-slate-700 flex items-center gap-1.5"><TableProperties size={14}/> Pedido {pedContext.numeroPedido}</span>
                                                <span className="text-xs bg-indigo-50 border border-indigo-100 text-indigo-700 px-2.5 py-1.5 rounded-lg font-semibold flex items-center gap-1.5"><Building2 size={14}/> {pedContext.centroCusto}</span>
                                            </div>
                                        </div>
                                        <div>
                                            <p className="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-2">Quantidade</p>
                                            <p className="text-sm font-bold text-slate-800 bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-inner inline-block">{pedContext.quantidade} UND</p>
                                        </div>
                                        <div className="lg:text-right">
                                            <p className="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-2">Valor Autorizado</p>
                                            <p className="text-xl font-black text-emerald-600">{formatCurrency(pedContext.valor)}</p>
                                        </div>
                                    </div>
                                ) : (
